/* ---------- constants ---------- */
const LEVELS=[1000,975,950,925,900,850,800,700,600,500,400,300,250,200,150];
const Rd=287.05, Cp=1005, Lv=2.5e6, eps=0.622, g=9.81;

/* ---------- thermodynamics ---------- */
const C2K=c=>c+273.15, K2C=k=>k-273.15;
// saturation vapour pressure (hPa), Bolton
function esat(Tc){return 6.112*Math.exp(17.67*Tc/(Tc+243.5));}
function mixingRatio(Tc,p){const e=esat(Tc);return 1000*eps*e/(p-e);} // g/kg at saturation
function mixingRatioFromDew(Td,p){const e=esat(Td);return 1000*eps*e/(p-e);}
function dewFromRH(Tc,rh){const e=esat(Tc)*rh/100;const l=Math.log(e/6.112);return 243.5*l/(17.67-l);}
// dry adiabat: potential temp conserved
function dryLift(T0K,p0,p){return T0K*Math.pow(p/p0,Rd/Cp);}
// LCL (Bolton 1980)
function lclTemp(Tk,Tdk){return 56+1/(1/(Tdk-56)+Math.log(Tk/Tdk)/800);}
// moist adiabatic lapse in K per Pa
function moistLapse(Tk,p){
  const Tc=K2C(Tk), rs=mixingRatio(Tc,p)/1000;
  const num=Rd*Tk+Lv*rs;
  const den=Cp+ (Lv*Lv*rs*eps)/(Rd*Tk*Tk);
  return (num/den)/(p*100); // K per Pa
}
// exact pseudoadiabat via conservation of equivalent potential temperature
// (Bolton 1980 eq. 39). thetaE is fixed at the start point; the temperature at any
// pressure is recovered by bisection. No integration drift.
function thetaE(Tk,p){ // saturated theta-e at (Tk, p hPa)
  const rs=mixingRatio(K2C(Tk),p)/1000;
  const th=Tk*Math.pow(1000/p, 0.2854*(1-0.28*rs));
  return th*Math.exp((3376/Tk-2.54)*rs*(1+0.81*rs));
}
function wetbulb(T,Td,p){ // iterative psychrometric wet-bulb (global: used by analyze & DCAPE)
  let w=T; for(let i=0;i<50;i++){ const ew=esat(w); const e=esat(Td);
    const diff=(0.00066*(1+0.00115*w)*p)*(T-w)-(ew-e); w+= diff*0.05; if(Math.abs(diff)<0.01)break; } return w; }
function thetaEStart(T,Td,p){ // theta-e of an (un)saturated parcel from T/Td at p
  const r=mixingRatioFromDew(Td,p)/1000;
  const TL=lclTemp(C2K(T),C2K(Td));
  const th=C2K(T)*Math.pow(1000/p, 0.2854*(1-0.28*r));
  return th*Math.exp((3376/TL-2.54)*r*(1+0.81*r));
}
function moistLift(Tk,p0,p){
  const target=thetaE(Tk,p0);
  let lo=120, hi=Tk+90;   // wide upper bound: moist DESCENT (downdrafts) warms strongly
  for(let i=0;i<60;i++){
    const mid=(lo+hi)/2;
    if(thetaE(mid,p)>target) hi=mid; else lo=mid;
  }
  return (lo+hi)/2;
}

/* ---------- geometry: skew-T coordinate mapping ---------- */
const X0=60, X1=460, Y0=30, Y1=500;
const LENS_R=82, LENS_ZOOM=2.6; // magnifier lens radius (viewBox units) and zoom factor
const Ptop=150, Pbot=1000, SKEW=0.9; // horizontal skew factor
const Tmin=-40, Tmax=40; // baseline temp range at bottom axis
function yOf(p){ // log-p
  const r=(Math.log(p)-Math.log(Ptop))/(Math.log(Pbot)-Math.log(Ptop));
  return Y0+(Y1-Y0)*r;
}
function pOf(y){ // inverse of yOf: screen y → pressure
  const r=(y-Y0)/(Y1-Y0);
  return Math.exp(Math.log(Ptop)+r*(Math.log(Pbot)-Math.log(Ptop)));
}
function xOf(Tc,p){
  const frac=(Tc-Tmin)/(Tmax-Tmin);
  const yfrac=(yOf(p)-Y0)/(Y1-Y0);
  return X0+(X1-X0)*frac + SKEW*(X1-X0)*(1-yfrac);
}

/* ---------- fetch ---------- */
async function getSounding(lat,lon,modelOverride){
  const hv=LEVELS.map(p=>`temperature_${p}hPa,relative_humidity_${p}hPa,wind_speed_${p}hPa,wind_direction_${p}hPa,geopotential_height_${p}hPa`).join(",");
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&hourly=${hv},temperature_2m,dew_point_2m,relative_humidity_2m,surface_pressure,precipitation,cape,wind_speed_10m,wind_direction_10m,wind_gusts_10m,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,weather_code,precipitation_probability`+
    `&forecast_days=2&timezone=auto&models=${modelOverride||MODEL}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error("Weather service returned "+r.status);
  return r.json();
}

/* ---------- build one hour's profile ---------- */
function buildProfile(d,i){
  const h=d.hourly;
  const sp=h.surface_pressure[i]||1000;
  const prof=[];
  // surface level
  prof.push({p:Math.min(sp,1000), T:h.temperature_2m[i], Td:h.dew_point_2m[i],
             ws:h.wind_speed_10m[i], wd:h.wind_direction_10m[i], sfc:true});
  for(const p of LEVELS){
    if(p>sp-5) continue;
    const T=h[`temperature_${p}hPa`][i];
    const rh=h[`relative_humidity_${p}hPa`][i];
    if(T==null||rh==null) continue;
    prof.push({p, T, Td:dewFromRH(T,Math.max(1,rh)),
               ws:h[`wind_speed_${p}hPa`][i], wd:h[`wind_direction_${p}hPa`][i],
               gh:h[`geopotential_height_${p}hPa`]?h[`geopotential_height_${p}hPa`][i]:null});
  }
  prof.sort((a,b)=>b.p-a.p);
  const g=(k)=>h[k]?h[k][i]:null;
  return {prof, elev:(d.elevation!=null?d.elevation:null), precip:h.precipitation[i]||0,
    pop:(h.precipitation_probability&&h.precipitation_probability[i]!=null)?h.precipitation_probability[i]:null,
    cape:h.cape?h.cape[i]:null, time:h.time[i],
    windSpd:g("wind_speed_10m"), windDir:g("wind_direction_10m"), gust:g("wind_gusts_10m"),
    cloud:g("cloud_cover"), cloudLow:g("cloud_cover_low"), cloudMid:g("cloud_cover_mid"), cloudHigh:g("cloud_cover_high"),
    vis:g("visibility"), rhSfc:h.relative_humidity_2m?h.relative_humidity_2m[i]:null,
    Tsfc:h.temperature_2m[i], Tdsfc:h.dew_point_2m[i], wcode:g("weather_code")};
}

/* ---------- indices ---------- */
/* ---- generalized parcel lift: works for surface, mixed-layer and elevated (MU) parcels ----
   Returns the path aligned to prof levels (null below the parcel origin), plus
   CAPE/CIN/LCL/LFC/EL computed with virtual temperature on both sides. */
function liftFrom(Ts,Tds,ps,prof){
  const Tk=C2K(Ts), Tdk=C2K(Tds);
  const Tlcl=lclTemp(Tk,Tdk);
  let pl=ps;
  for(let pp=ps; pp>150; pp-=1){ if(dryLift(Tk,ps,pp)<=Tlcl){pl=pp;break;} }
  const lclP=pl;
  const rStart=mixingRatioFromDew(Tds,ps)/1000;
  const path=prof.map(lv=>{
    if(lv.p>ps+0.01) return {p:lv.p,T:null};        // below the parcel origin
    const Tp = lv.p>=lclP ? K2C(dryLift(Tk,ps,lv.p)) : K2C(moistLift(Tlcl,lclP,lv.p));
    return {p:lv.p,T:Tp};
  });
  const tvEnv=(l)=>{ const r=(l.Td!=null?mixingRatioFromDew(l.Td,l.p):0)/1000; return C2K(l.T)*(1+0.608*r); };
  const tvParcel=(Tp,p)=>{ const r=(p>=lclP?rStart:mixingRatio(Tp,p)/1000); return C2K(Tp)*(1+0.608*r); };
  let capePos=0, cin=0, elP=null, lfcP=null;
  for(let k=0;k<prof.length-1;k++){
    if(path[k].T==null||path[k+1].T==null) continue;
    const p1=prof[k].p,p2=prof[k+1].p;
    const b1=(tvParcel(path[k].T,p1)-tvEnv(prof[k])), b2=(tvParcel(path[k+1].T,p2)-tvEnv(prof[k+1]));
    const lp=Math.log(p1/p2);
    const contrib=Rd*(b1+b2)/2*lp;
    if(prof[k].p<=lclP){
      if(contrib>0){ capePos+=contrib; if(!lfcP)lfcP=prof[k].p; }
      else if(!elP) cin+=contrib;
    } else {
      if(contrib<0) cin+=contrib;
    }
    if(contrib<0 && lfcP && !elP && prof[k].p<lclP) elP=prof[k].p;
  }
  const elAbove=(!elP && !!lfcP);
  return {path,lclP,cape:capePos,cin,elP,lfcP,elAbove,Tlcl,startP:ps};
}
/* ---- DCAPE: downdraft energy. Origin = min theta-e level (800–500 hPa); the parcel
   starts at the wet-bulb temperature there and descends saturated (theta-e conserving). */
function computeDCAPE(prof){
  let oi=-1, oe=1e9;
  prof.forEach((l,i)=>{ if(l.p<=800&&l.p>=500&&l.Td!=null){ const e=thetaEStart(l.T,l.Td,l.p); if(e<oe){oe=e;oi=i;} } });
  if(oi<0) return {dcape:null,originP:null};
  const o=prof[oi];
  const TwK=C2K(wetbulb(o.T,o.Td,o.p));
  let d=0;
  const tvEnv=(l)=>{ const r=(l.Td!=null?mixingRatioFromDew(l.Td,l.p):0)/1000; return C2K(l.T)*(1+0.608*r); };
  for(let k=oi;k>0;k--){
    const a=prof[k], b=prof[k-1];                    // downward: a (upper) -> b (lower)
    const Ta=K2C(moistLift(TwK,o.p,a.p)), Tb=K2C(moistLift(TwK,o.p,b.p));
    const tva=C2K(Ta)*(1+0.608*mixingRatio(Ta,a.p)/1000);
    const tvb=C2K(Tb)*(1+0.608*mixingRatio(Tb,b.p)/1000);
    d += Rd*((tvEnv(a)-tva)+(tvEnv(b)-tvb))/2*Math.log(b.p/a.p);
  }
  return {dcape:Math.max(0,Math.round(d)), originP:o.p};
}
function parcelLbl(){ return {sb:L("地面 SB","Surface SB"),ml:L("混合层 ML","Mixed ML"),mu:L("最不稳定 MU","Most-unstable MU")}[PARCEL_SEL]||"SB"; }
function parcelTag(){ return {sb:"SB",ml:"ML",mu:"MU"}[PARCEL_SEL]||"SB"; }
function dcapeWord(d){
  if(d==null)return "—";
  if(d<400)  return L("弱 — 下击暴流风险低","weak — low downburst risk");
  if(d<800)  return L("中等 — 阵风可观","moderate — gusty outflow");
  if(d<1200) return L("强 — 谨防下击暴流损果","strong — downburst may strip fruit");
  return L("极强 — 严防落地强风","extreme — damaging downburst winds");
}
/* ================= ensemble rain projection (real members, not a derived guess) ================= */
let ENS=null;   // {model,nMembers,stats:[{p10,p25,p50,p75,p90,t1,t5,t10}] indexed by hour, confWord, confCls}
const ENS_MAP={ // deterministic model -> matching ensemble suite (ECMWF fallback for models without one)
  ecmwf_ifs025:"ecmwf_ifs025", ecmwf_ifs:"ecmwf_ifs025", ecmwf_aifs025_single:"ecmwf_ifs025",
  gfs_seamless:"gfs_seamless", gfs_graphcast025:"gfs_seamless",
  icon_seamless:"icon_seamless", gem_global:"gem_global",
  jma_gsm:"ecmwf_ifs025", cma_grapes_global:"ecmwf_ifs025",
};
function pctl(sorted,f){ const n=sorted.length; if(!n)return null;
  const idx=f*(n-1), lo=Math.floor(idx), hi=Math.ceil(idx);
  return sorted[lo]+(sorted[hi]-sorted[lo])*(idx-lo); }
function ensStats(members,i){
  const v=members.map(m=>m[i]).filter(x=>x!=null&&isFinite(x)).sort((a,b)=>a-b);
  if(v.length<5)return null;
  const n=v.length;
  return { p10:pctl(v,.10),p25:pctl(v,.25),p50:pctl(v,.50),p75:pctl(v,.75),p90:pctl(v,.90),
    t1:Math.round(100*v.filter(x=>x>=1).length/n),
    t5:Math.round(100*v.filter(x=>x>=5).length/n),
    t10:Math.round(100*v.filter(x=>x>=10).length/n) };
}
async function fetchEnsemble(){
  ENS=null; renderEnsemble();
  if(!LATLON)return;
  const em=ENS_MAP[MODEL]||"ecmwf_ifs025";
  try{
    const url=`https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${LATLON[0]}&longitude=${LATLON[1]}`+
      `&hourly=precipitation&models=${em}&forecast_days=2&timezone=auto`;
    const r=await fetch(url);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json();
    const h=d.hourly||{};
    const members=Object.keys(h).filter(k=>/^precipitation(_member\d+)?$/.test(k)).map(k=>h[k]);
    if(members.length<5) throw new Error(L("该模式无集合数据","no ensemble for this model"));
    const stats=[]; for(let i=0;i<h.time.length;i++) stats[i]=ensStats(members,i);
    // day confidence: mean 10-90 width over the visible window
    let wsum=0,wn=0;
    for(let i=HR_START;i<=Math.min(HR_END,stats.length-1);i++){ if(stats[i]){wsum+=stats[i].p90-stats[i].p10;wn++;} }
    const w=wn?wsum/wn:0;
    const conf = w<1.5?["hi",L("高一致","high agreement")] : w<5?["md",L("中等一致","moderate agreement")] : ["lo",L("分歧大","low agreement")];
    ENS={model:em,nMembers:members.length,stats,confCls:conf[0],confWord:conf[1],w};
  }catch(e){
    ENS={error:String(e.message||e)};
  }
  renderEnsemble();
}
function renderEnsemble(){
  const wrap=document.getElementById("enswrap"), svg=document.getElementById("enschart"),
        cap=document.getElementById("ensCap"), tiers=document.getElementById("ensTiers");
  if(!wrap||!svg)return;
  const T=document.getElementById("ensTitle");
  if(T)T.textContent=L("集合降雨投影 · 51种未来的雨","Ensemble rain projection · many futures of rain");
  svg.innerHTML=""; if(tiers)tiers.innerHTML="";
  if(!ENS){ if(cap)cap.textContent=L("正在获取集合成员…","Fetching ensemble members…"); return; }
  if(ENS.error){ if(cap)cap.textContent=L("集合数据获取失败：","Ensemble fetch failed: ")+ENS.error; return; }
  const st=ENS.stats;
  const ENS_SHORT={ecmwf_ifs025:"IFS",gfs_seamless:"GFS",icon_seamless:"ICON",gem_global:"GEM"};
  const short=ENS_SHORT[ENS.model]||ENS.model;
  if(cap)cap.innerHTML=L(
    `<b>${short}</b> 集合 · ${ENS.nMembers} 成员 — 阴影＝成员的10–90%范围，深带＝25–75%，实线＝中位数`+
    `<span class="ens-conf ${ENS.confCls}">${ENS.confWord}</span>`,
    `<b>${short}</b> ensemble · ${ENS.nMembers} members — shade = 10–90% of members, dark band = 25–75%, line = median`+
    `<span class="ens-conf ${ENS.confCls}">${ENS.confWord}</span>`);
  const X0e=34,X1e=352,Y0e=8,Y1e=136;
  const n=HR_END-HR_START+1, xOf=i=>X0e+(i-HR_START)/(n-1)*(X1e-X0e);
  let vmax=2; for(let i=HR_START;i<=HR_END;i++){ if(st[i])vmax=Math.max(vmax,st[i].p90); }
  vmax=Math.ceil(vmax*1.15);
  const yOf=v=>Y1e-(v/vmax)*(Y1e-Y0e);
  const g=el("g",{}); svg.appendChild(g);
  for(const v of [0,Math.round(vmax/2),vmax]){
    g.appendChild(line(X0e,yOf(v),X1e,yOf(v),"var(--line)",0.6));
    g.appendChild(txt(X0e-4,yOf(v)+3,String(v),'tick',"end","var(--faint)"));
  }
  const band=(loK,hiK,fill,op)=>{
    const up=[],dn=[];
    for(let i=HR_START;i<=HR_END;i++){ if(!st[i])continue; up.push(`${xOf(i)},${yOf(st[i][hiK])}`); dn.unshift(`${xOf(i)},${yOf(st[i][loK])}`); }
    if(up.length>1) g.appendChild(el("polygon",{points:up.concat(dn).join(" "),fill,opacity:op}));
  };
  band("p10","p90","#5d9cff",0.16);
  band("p25","p75","#5d9cff",0.26);
  const med=[]; for(let i=HR_START;i<=HR_END;i++){ if(st[i])med.push([xOf(i),yOf(st[i].p50)]); }
  if(med.length>1)g.appendChild(poly(med,"#9cc4ff",1.8));
  for(let i=HR_START;i<=HR_END;i++){
    if((i-HR_START)%6===0) g.appendChild(txt(xOf(i),Y1e+14,fmtHour(DATA.hourly.time[i]),'tick',"middle","var(--faint)"));
  }
  g.appendChild(el("line",{id:"ensCur",x1:xOf(CUR_I),x2:xOf(CUR_I),y1:Y0e,y2:Y1e,stroke:"var(--accent)","stroke-width":1.4,"stroke-dasharray":"3 3"}));
  ENS.geo={X0e,X1e,n,Y0e,Y1e};
  const hit=el("rect",{x:X0e,y:Y0e,width:X1e-X0e,height:Y1e-Y0e,fill:"transparent"});
  hit.style.cursor="pointer";
  hit.addEventListener("click",ev=>{
    const r=svg.getBoundingClientRect();
    const fx=(ev.clientX-r.left)/r.width*360;
    showHour(HR_START+Math.round((fx-X0e)/(X1e-X0e)*(n-1)));
  });
  g.appendChild(hit);
  updateEnsHour(CUR_I);
}
function updateEnsHour(i){
  if(!ENS||!ENS.stats)return;
  const c=document.getElementById("ensCur");
  if(c&&ENS.geo){ const x=ENS.geo.X0e+(i-HR_START)/(ENS.geo.n-1)*(ENS.geo.X1e-ENS.geo.X0e); c.setAttribute("x1",x);c.setAttribute("x2",x); }
  const t=document.getElementById("ensTiers"), s=ENS.stats[i];
  if(t) t.innerHTML = s
    ? L(`<span>≥1mm <b>${s.t1}%</b></span><span>≥5mm <b>${s.t5}%</b></span><span>≥10mm <b>${s.t10}%</b></span><span>中位 <b>${s.p50.toFixed(1)}</b> mm</span>`,
        `<span>≥1mm <b>${s.t1}%</b></span><span>≥5mm <b>${s.t5}%</b></span><span>≥10mm <b>${s.t10}%</b></span><span>median <b>${s.p50.toFixed(1)}</b> mm</span>`)
    : "";
}
/* ---- parcel-pattern matrix: classify the SB/ML/MU disagreement into an operational scenario ---- */
function classifyParcels(A){
  const sb=A.capeSB??0, ml=A.capeML??0, mu=A.capeMU??0;
  const hi=800, lo=300;
  if(mu>=hi && sb<Math.max(400,mu*0.35)) return "hidden";     // fuel above a lid
  if(Math.min(sb,ml,mu)>=hi)             return "loaded";     // unstable everywhere
  if(Math.max(sb,ml,mu)<lo)              return "stable";     // genuinely quiet
  if(ml>=hi && sb<ml*0.6)                return "heating";    // needs afternoon mixing
  return "mixed";
}
function parcelMatrixRows(){
  return [
    {k:"hidden", ic:"⏳", t:L("隐藏燃料（逆温之上）","Hidden fuel (above a lid)"),
      d:L("MU 远大于 SB — 地面平静是假象，午后逆温被晒穿会一次性爆发。早上尽早喷药、收果、收网；别信蓝天。","MU ≫ SB — the calm surface is a deadline. Once heating breaks the lid, it releases at once. Spray/harvest early; don't trust the blue sky.")},
    {k:"loaded", ic:"⚡", t:L("全层蓄能","Loaded everywhere"),
      d:L("SB/ML/MU 全都高 — 无盖无缓冲，任何触发随时起风暴。没有安全窗口，见塔状积云即警。","All three high — no cap, no buffer. Any trigger fires storms. No safe window; the first tower is the warning.")},
    {k:"heating", ic:"🌤️", t:L("需午后加热","Needs afternoon heating"),
      d:L("ML 高而 SB 一般 — 要等太阳把底层搅匀，风暴多在午后中段。上午是可用的作业窗口。","ML high, SB modest — storms wait for the boundary layer to mix, typically mid-afternoon. The morning is a usable work window.")},
    {k:"mixed", ic:"🌦️", t:L("边缘／混合","Marginal / mixed"),
      d:L("三气块分歧不典型 — 关注逐小时趋势与触发（海风、山地、辐合）。","Parcels disagree atypically — watch the hourly trend and triggers (sea breeze, hills, convergence).")},
    {k:"stable", ic:"✅", t:L("确实稳定","Genuinely stable"),
      d:L("三气块都低 — 查过隐藏燃料也没有。这是有把握的喷药/晒果窗口，不是侥幸。","All three low — hidden fuel checked and absent. A confident spray/dry window, not a hopeful one.")},
  ];
}
function renderParcelMatrix(A){
  const el=document.getElementById("pmatrix"); if(!el||!A)return;
  const act=classifyParcels(A);
  const f0=(x)=>x!=null&&isFinite(x)?Math.round(x):"—";
  el.innerHTML=`<div class="pm-title">${L("气块矩阵 · 今天属于哪种天？","Parcel matrix · what kind of day is this?")}</div>
    <div class="pm-sub">SB ${f0(A.capeSB)} · ML ${f0(A.capeML)} · MU ${f0(A.capeMU)} J/kg</div>`+
    parcelMatrixRows().map(r=>`<div class="pm-row${r.k===act?" on":""}"><div class="pm-ic">${r.ic}</div><div><div class="pm-t">${r.t}</div><div class="pm-d">${r.d}</div></div></div>`).join("");
}
let PARCEL_SEL=(function(){ try{const v=localStorage.getItem("skewt.parcel.v1"); return ["sb","ml","mu"].includes(v)?v:"sb";}catch(e){return "sb";} })();
function analyze(P){
  const prof=P.prof, sfc=prof[0];
  // --- the three standard parcels ---
  // SB: surface values.  ML: mean theta & mixing ratio of the lowest 100 hPa.
  // MU: the level with highest theta-e in the lowest 300 hPa (catches elevated fuel).
  const pSB=liftFrom(sfc.T,sfc.Td,sfc.p,prof);
  let thSum=0,rSum=0,nML=0;
  for(const l of prof){ if(l.p>=sfc.p-100&&l.Td!=null){ thSum+=C2K(l.T)*Math.pow(1000/l.p,0.2854); rSum+=mixingRatioFromDew(l.Td,l.p); nML++; } }
  let pML=pSB;
  if(nML>=2){
    const Tml=K2C((thSum/nML)*Math.pow(sfc.p/1000,0.2854));
    const eML=(rSum/nML)*sfc.p/(622+(rSum/nML));
    const TdMl=(function(){const ln=Math.log(eML/6.112);return 243.5*ln/(17.67-ln);})();
    pML=liftFrom(Tml,Math.min(TdMl,Tml),sfc.p,prof);
  }
  let mi=0, me=-1e9;
  prof.forEach((l,i)=>{ if(l.p>=sfc.p-300&&l.Td!=null){ const e=thetaEStart(l.T,l.Td,l.p); if(e>me){me=e;mi=i;} } });
  const mL=prof[mi];
  const pMU=(mi===0)?pSB:liftFrom(mL.T,mL.Td,mL.p,prof);
  const PARCELS={sb:pSB,ml:pML,mu:pMU};
  const SEL=PARCELS[PARCEL_SEL]||pSB;
  const {dcape,originP:dcapeP}=computeDCAPE(prof);
  // --- selected parcel drives the chart & primary cards (back-compat names) ---
  const path=SEL.path, lclP=SEL.lclP, Tlcl=SEL.Tlcl;
  let capePos=SEL.cape, cin=SEL.cin, elP=SEL.elP, lfcP=SEL.lfcP;
  let lclHt=null;
  const rSfc=mixingRatioFromDew(sfc.Td,sfc.p)/1000;
  const elAbove = SEL.elAbove;
  // precipitable water (mm) = (1/g)∫ q dp
  let pw=0;
  for(let k=0;k<prof.length-1;k++){
    const r1=mixingRatioFromDew(prof[k].Td,prof[k].p)/1000, q1=r1/(1+r1);
    const r2=mixingRatioFromDew(prof[k+1].Td,prof[k+1].p)/1000, q2=r2/(1+r2);
    const dp=(prof[k].p-prof[k+1].p)*100;
    pw += (q1+q2)/2*dp/g;
  }
  // lifted index: env - SURFACE parcel at 500 (LI is SB by convention)
  let LI=null;
  const i500=prof.findIndex(l=>l.p<=500);
  if(i500>0 && pSB.path[i500].T!=null) LI=prof[i500].T - pSB.path[i500].T;

  // ---- helpers for level interpolation ----
  const interpAtP=(targetP,key)=>{ // linear-in-logP interpolation of prof[key]
    for(let k=0;k<prof.length-1;k++){
      const a=prof[k],b=prof[k+1];
      if((a.p>=targetP&&b.p<=targetP)){
        const f=(Math.log(a.p)-Math.log(targetP))/(Math.log(a.p)-Math.log(b.p));
        return a[key]+(b[key]-a[key])*f;
      }
    }
    return null;
  };
  const valAtP=p=>({T:interpAtP(p,"T"),Td:interpAtP(p,"Td")});

  // ---- classic stability indices ----
  const T850=interpAtP(850,"T"), Td850=interpAtP(850,"Td");
  const T700=interpAtP(700,"T"), Td700=interpAtP(700,"Td");
  const T500=interpAtP(500,"T");
  let KI=null, TT=null, SI=null;
  if(T850!=null&&Td850!=null&&T700!=null&&Td700!=null&&T500!=null){
    KI=(T850-T500)+Td850-(T700-Td700);                 // K-Index
    TT=(T850+Td850)-2*T500;                              // Total Totals
    // Showalter: lift a parcel from 850 to 500 and compare
    const Tl850=lclTemp(C2K(T850),C2K(Td850));
    let p850lcl=850; for(let pp=850;pp>400;pp-=2){if(dryLift(C2K(T850),850,pp)<=Tl850){p850lcl=pp;break;}}
    const parc500=K2C(moistLift(Tl850,p850lcl,500));
    SI=T500-parc500;
  }

  // ---- special heights ----
  // hypsometric heights: integrate layer thickness up the actual temperature profile
  // dz = (Rd*Tv_mean/g) * ln(p_lower/p_upper), with Tv ≈ T*(1+0.61r)
  const HTZ=[]; {
    // Prefer the model's own geopotential heights (converted to metres above ground
    // via the grid-cell elevation). Fall back to hypsometric integration of the
    // temperature profile where geopotential is missing.
    const elev=(P.elev!=null&&isFinite(P.elev))?P.elev:null;
    const ghLevels=prof.filter(l=>l.gh!=null&&isFinite(l.gh));
    if(elev!=null && ghLevels.length>=Math.max(3,(prof.length-1)*0.8)){
      HTZ.push({p:prof[0].p,z:0});
      for(const l of ghLevels){ const z=Math.max(0,l.gh-elev); HTZ.push({p:l.p,z}); }
      HTZ.sort((a,b)=>b.p-a.p);
    } else {
      const RdC=287.05, G=9.80665;
      const tvK=(l)=>{ const r=(l.Td!=null?mixingRatioFromDew(l.Td,l.p):0)/1000; return (l.T+273.15)*(1+0.61*r); };
      let z=0; HTZ.push({p:prof[0].p,z:0});
      for(let k=0;k<prof.length-1;k++){
        const a=prof[k], b=prof[k+1];
        const tvm=(tvK(a)+tvK(b))/2;
        z += RdC*tvm/G*Math.log(a.p/b.p);
        HTZ.push({p:b.p,z});
      }
    }
  }
  const heightAtP=(p)=>{
    if(p>=HTZ[0].p) return 0;
    for(let k=0;k<HTZ.length-1;k++){
      if(p<=HTZ[k].p && p>=HTZ[k+1].p){
        const f=Math.log(HTZ[k].p/p)/Math.log(HTZ[k].p/HTZ[k+1].p);
        return Math.round(HTZ[k].z+f*(HTZ[k+1].z-HTZ[k].z));
      }
    }
    return Math.round(HTZ[HTZ.length-1].z);
  };
  // freezing level: where env T crosses 0°C going up
  let frzP=null;
  for(let k=0;k<prof.length-1;k++){ if(prof[k].T>=0&&prof[k+1].T<0){
    const f=(prof[k].T-0)/(prof[k].T-prof[k+1].T); frzP=prof[k].p+(prof[k+1].p-prof[k].p)*f; break; } }
  // wet-bulb zero: approximate wet-bulb per level, find 0 crossing
  // (wetbulb is now a global function — shared with the DCAPE computation)
  let wbzP=null, prevWB=wetbulb(sfc.T,sfc.Td,sfc.p);
  for(let k=1;k<prof.length;k++){ const wb=wetbulb(prof[k].T,prof[k].Td,prof[k].p);
    if(prevWB>=0&&wb<0){ const f=prevWB/(prevWB-wb); wbzP=prof[k-1].p+(prof[k].p-prof[k-1].p)*f; break; } prevWB=wb; }

  // ---- lapse rates (°C/km) over the TRUE layer thickness (hypsometric) ----
  const lapse=(pHi,pLo)=>{ const tHi=interpAtP(pHi,"T"),tLo=interpAtP(pLo,"T");
    if(tHi==null||tLo==null)return null;
    const dz=(heightAtP(pLo)-heightAtP(pHi))/1000; if(!(dz>0))return null;
    return (tHi-tLo)/dz; };
  const lr700_500=lapse(700,500), lr850_500=lapse(850,500);

  // ---- EL height & storm depth ----
  lclHt=heightAtP(lclP);
  const elHt=elP?heightAtP(elP):null, lfcHt=lfcP?heightAtP(lfcP):null;

  // ---- wind shear & SRH (needs u,v per level) ----
  const toUV=(spd,dir)=>{const r=(dir||0)*Math.PI/180;return {u:-spd*Math.sin(r), v:-spd*Math.cos(r)};};
  const windAt=targetP=>{ // nearest level with wind
    let best=null,bd=1e9; for(const l of prof){ if(l.ws==null)continue; const d=Math.abs(l.p-targetP); if(d<bd){bd=d;best=l;} } return best; };
  const wSfc=prof.find(l=>l.ws!=null), w6=windAt(500); // ~500hPa ≈ 5-6km proxy
  let shear=null, shearDir=null;
  // only compute when a real mid-level wind exists (within 150 hPa of 500) and isn't the surface itself —
  // otherwise shear is UNKNOWN (null), never a fabricated 0
  if(wSfc&&w6&&w6!==wSfc&&Math.abs(w6.p-500)<=150){ const a=toUV(wSfc.ws,wSfc.wd),b=toUV(w6.ws,w6.wd);
    const du=b.u-a.u,dv=b.v-a.v; shear=Math.hypot(du,dv); shearDir=(Math.atan2(-du,-dv)*180/Math.PI+360)%360; }
  // storm-relative helicity 0-3km (proxy using levels up to ~700hPa), Bunkers-ish storm motion omitted → use 0
  let srh=0; const layers=prof.filter(l=>l.ws!=null&&l.p>=650);
  for(let k=0;k<layers.length-1;k++){ const a=toUV(layers[k].ws,layers[k].wd),b=toUV(layers[k+1].ws,layers[k+1].wd);
    srh += (a.u*b.v - b.u*a.v); }

  // convective temperature: surface T needed for parcel to reach LCL along mixing ratio → approx = Tlcl brought dry-adiabatically to sfc
  const convT = K2C(dryLift(Tlcl, lclP, sfc.p));

  // precip type hint
  let ptype="Rain";
  // subfreezing surface: no wet-bulb-zero crossing means the whole column's wet-bulb is
  // below 0°C -> snow; a crossing implies an elevated warm layer -> freezing rain / sleet
  if(sfc.T<=0) ptype = (wbzP==null)?"Snow":"Freezing/sleet";

  // precip efficiency estimate
  const cape=P.cape!=null?P.cape:capePos;
  const rhSfc=100*esat(sfc.Td)/esat(sfc.T);
  let effEst = pw * (0.2 + Math.min(0.5, cape/6000)) * (rhSfc/100);

  // total column & PBL depth-ish
  const dd=sfc.T-sfc.Td; // surface dewpoint depression

  return {path,lclP,lclHt,cape,cin,elP,lfcP,pw,LI,Tlcl:K2C(Tlcl),rhSfc,effEst,
    parcels:PARCELS, parcelSel:PARCEL_SEL,
    capeSB:Math.round(pSB.cape),capeML:Math.round(pML.cape),capeMU:Math.round(pMU.cape),
    cinSB:Math.round(pSB.cin), muStartP:(mi===0?null:mL.p),
    dcape, dcapeP,
    KI,TT,SI,frzP,frzHt:frzP?heightAtP(frzP):null,wbzP,wbzHt:wbzP?heightAtP(wbzP):null,
    elAbove,topHt:heightAtP(prof[prof.length-1].p),htOfP:heightAtP,
    lr700_500,lr850_500,elHt,lfcHt,shear,shearDir,srh,convT,ptype,dd,
    profWind:prof.filter(l=>l.ws!=null).map(l=>({p:l.p,ws:l.ws,wd:l.wd,uv:toUV(l.ws,l.wd),ht:heightAtP(l.p)}))};
}

/* ---------- svg helpers ---------- */
const NS="http://www.w3.org/2000/svg";
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function line(x1,y1,x2,y2,st,w,dash){return el("line",{x1,y1,x2,y2,stroke:st,"stroke-width":w||1,...(dash?{"stroke-dasharray":dash}:{})});}
function poly(pts,st,w,dash){return el("polyline",{points:pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" "),fill:"none",stroke:st,"stroke-width":w,...(dash?{"stroke-dasharray":dash}:{})});}
function txt(x,y,s,cls,anchor,fill){const t=el("text",{x,y,class:cls||"tick","text-anchor":anchor||"middle"});if(fill)t.setAttribute("fill",fill);t.textContent=s;return t;}

/* ---------- draw ---------- */
function draw(P,A,svgEl){
  const svg=svgEl||document.getElementById("chart");
  svg.innerHTML="";
  const gid = svg.id==="chartBig" ? "chartG_big" : "chartG_main";
  const g0=el("g",{id:gid}); svg.appendChild(g0);
  // frame
  g0.appendChild(el("rect",{x:X0,y:Y0,width:X1-X0,height:Y1-Y0,fill:"#0d1322",stroke:"var(--line)"}));

  // isotherms (skewed)
  for(let T=-100;T<=50;T+=10){
    const pts=[];
    for(const p of [Pbot,Ptop]) pts.push([xOf(T,p),yOf(p)]);
    const ln=poly(pts,"var(--iso)",0.7); g0.appendChild(ln);
  }
  // dry adiabats
  for(let th=-30;th<=160;th+=20){
    const pts=[];
    for(let p=Pbot;p>=Ptop;p-=25){
      const Tc=K2C(dryLift(C2K(th),1000,p));
      if(Tc>Tmin-40&&Tc<Tmax+40)pts.push([xOf(Tc,p),yOf(p)]);
    }
    g0.appendChild(poly(pts,"var(--dry)",0.6));
  }
  // moist adiabats
  for(let Tb=-20;Tb<=40;Tb+=8){
    const pts=[];let Tk=C2K(Tb);
    for(let p=1000;p>=Ptop;p-=25){
      if(p<1000)Tk=moistLift(C2K(Tb),1000,p);
      const Tc=K2C(Tk);
      if(Tc>Tmin-60)pts.push([xOf(Tc,p),yOf(p)]);
    }
    g0.appendChild(poly(pts,"var(--moist)",0.7,"4 3"));
  }
  // mixing ratio lines
  [0.5,1,2,4,8,12,20].forEach(w=>{
    const pts=[];
    for(let p=Pbot;p>=400;p-=25){
      const e=w/1000*p/(eps+w/1000);
      const Tc=243.5*Math.log(e/6.112)/(17.67-Math.log(e/6.112));
      pts.push([xOf(Tc,p),yOf(p)]);
    }
    g0.appendChild(poly(pts,"var(--mix)",0.6,"2 4"));
    const last=pts[pts.length-1];
    g0.appendChild(txt(last[0],last[1]-2,w+"",'gl-lbl',"middle","var(--mix)"));
  });

  // pressure ticks + labels
  [1000,850,700,500,400,300,250,200,150].forEach(p=>{
    const y=yOf(p);
    g0.appendChild(line(X0,y,X1,y,"var(--line)",0.5));
    g0.appendChild(txt(X0-6,y+3,p+"",'tick',"end"));
  });
  const pLbl=txt(16,(Y0+Y1)/2,L("气压 (hPa)","PRESSURE (hPa)"),LANG==="zh"?'axl-zh':'axl',"middle");
  pLbl.setAttribute("transform",`rotate(-90 16 ${(Y0+Y1)/2})`);
  g0.appendChild(pLbl);
  // temp ticks along bottom
  for(let T=Tmin;T<=Tmax;T+=10){
    const x=xOf(T,Pbot);
    g0.appendChild(txt(x,Y1+14,T+"°",'tick'));
  }
  g0.appendChild(txt((X0+X1)/2,Y1+30,L("温度 (°C · 斜交)","TEMPERATURE (°C, skewed)"),LANG==="zh"?'axl-zh':'axl'));

  // CAPE shading (parcel warmer than env, above LCL)
  const prof=P.prof, path=A.path;
  const capePoly=[];
  for(let k=0;k<prof.length;k++){
    if(prof[k].p<=A.lclP && path[k].T>prof[k].T){
      capePoly.push([xOf(prof[k].T,prof[k].p),yOf(prof[k].p)]);
    }
  }
  // build filled CAPE band between env and parcel
  const capeArea=[];
  for(let k=0;k<prof.length;k++){
    if(prof[k].p<=A.lclP && path[k].T>prof[k].T) capeArea.push([xOf(path[k].T,prof[k].p),yOf(prof[k].p)]);
  }
  for(let k=prof.length-1;k>=0;k--){
    if(prof[k].p<=A.lclP && path[k].T>prof[k].T) capeArea.push([xOf(prof[k].T,prof[k].p),yOf(prof[k].p)]);
  }
  if(capeArea.length>2){
    g0.appendChild(el("polygon",{points:capeArea.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" "),fill:"rgba(255,77,109,0.22)",stroke:"none"}));
  }

  // environment temperature & dew point
  const Tpts=prof.map(l=>[xOf(l.T,l.p),yOf(l.p)]);
  const Dpts=prof.map(l=>[xOf(l.Td,l.p),yOf(l.p)]);
  // wet-bulb curve: evaporative-cooling temperature, always between dew point and temperature
  {
    const Wpts=[];
    for(const l of P.prof){
      if(l.p>Pbot||l.p<Ptop||l.Td==null)continue;
      Wpts.push([xOf(wetbulb(l.T,l.Td,l.p),l.p),yOf(l.p)]);
    }
    if(Wpts.length>1)g0.appendChild(poly(Wpts,"#59d6e6",1.4,"1 0"));
  }
  // cloud bar: narrow humidity strip along the right edge (denser = closer to saturation)
  {
    for(let k=0;k<P.prof.length-1;k++){
      const a=P.prof[k],b=P.prof[k+1];
      if(a.p>Pbot||b.p<Ptop||a.Td==null)continue;
      const rh=(esat(a.Td)/esat(a.T))*100;
      const al=Math.max(0,Math.min(1,(rh-60)/40));
      if(al<=0.02)continue;
      const y1=yOf(Math.min(a.p,Pbot)), y2=yOf(Math.max(b.p,Ptop));
      const r=el("rect",{x:X1+2,y:Math.min(y1,y2),width:6,height:Math.abs(y2-y1),fill:"#9fc4ff",opacity:(0.15+0.55*al).toFixed(2)});
      g0.appendChild(r);
    }
  }
  g0.appendChild(poly(Dpts,"var(--dew)",2.6));
  g0.appendChild(poly(Tpts,"var(--temp)",2.6));
  // compare-model overlay: second model's T/Td in violet
  if(COMPARE_MODEL&&DATA2&&DATA2.hourly){
    try{
      const P2=buildProfile(DATA2,CUR_I);
      const t2=[],d2=[];
      for(const l of P2.prof){
        if(l.p>Pbot||l.p<Ptop)continue;
        t2.push([xOf(l.T,l.p),yOf(l.p)]);
        if(l.Td!=null)d2.push([xOf(l.Td,l.p),yOf(l.p)]);
      }
      if(d2.length>1)g0.appendChild(poly(d2,"#c084fc",1.5,"2 4"));
      if(t2.length>1){
        g0.appendChild(poly(t2,"#c084fc",1.7));
        const mid=t2[Math.max(0,Math.floor(t2.length*0.55))];
        g0.appendChild(txt(mid[0]+6,mid[1],modelShortOf(COMPARE_MODEL)||"",'gl-lbl',"start","#c084fc"));
      }
    }catch(e){}
  }
  // radiosonde overlay: observed balloon profile in neutral greys over the forecast
  if(SONDE_ON&&SONDE&&SONDE.levels){
    const oT=[],oD=[];
    for(const l of SONDE.levels){
      if(l.p>Pbot||l.p<Ptop)continue;
      if(l.T!=null)oT.push([xOf(l.T,l.p),yOf(l.p)]);
      if(l.Td!=null)oD.push([xOf(l.Td,l.p),yOf(l.p)]);
    }
    if(oD.length>1)g0.appendChild(poly(oD,"#8fa6c8",1.8,"3 4"));
    if(oT.length>1){
      g0.appendChild(poly(oT,"#e9eef8",1.8,"6 4"));
      // label the observed curve mid-chart (near 350 hPa) where it's actually visible
      let li=0,ld=1e9;
      SONDE.levels.forEach((l,i)=>{ if(l.T!=null&&l.p>=Ptop&&l.p<=Pbot){ const d=Math.abs(l.p-350); if(d<ld){ld=d;li=i;} } });
      const lp=SONDE.levels[li];
      const lx=xOf(lp.T,lp.p), ly=yOf(lp.p);
      g0.appendChild(txt(lx-8,ly-6,`🎈${L("实测","OBS")}·${SONDE.stName||""}`,'gl-lbl',"end","#e9eef8"));
    }
  }
  // parcel path
  const Ppts=path.filter(p=>p.T>Tmin-80).map(p=>[xOf(p.T,p.p),yOf(p.p)]);
  g0.appendChild(poly(Ppts,"var(--parcel)",1.8,"5 4"));

  // wind barbs on right
  const bx=X1+18;
  prof.forEach(l=>{
    if(l.ws==null)return;
    // keep barbs inside the plot; nudge the surface barb (at the very bottom edge) up a touch
    const y=Math.min(Y1-10, Math.max(Y0+10, yOf(l.p)));
    windBarb(g0,bx,y,l.ws,l.wd);
  });

  // key-level markers (parcel-derived, labeled on the RIGHT)
  const mark=(p,label,col)=>{
    if(!p)return;const y=yOf(p);
    g0.appendChild(line(X0,y,X1,y,col,1,"2 2"));
    g0.appendChild(txt(X1-4,y-3,label,'gl-lbl',"end",col));
  };
  mark(A.lclP,"LCL "+Math.round(A.lclHt)+"m","var(--parcel)");
  if(A.lfcP)mark(A.lfcP,"LFC","var(--warn)");
  if(A.elP)mark(A.elP,"EL","var(--danger)");
  // thermal levels (freezing / wet-bulb zero), labeled on the LEFT
  const markL=(p,label,col)=>{
    if(!p)return;const y=yOf(p);
    g0.appendChild(line(X0,y,X1,y,col,1,"5 4"));
    g0.appendChild(txt(X0+5,y-3,label,'gl-lbl',"start",col));
  };
  markL(A.frzP,"0°C "+(A.frzHt!=null?Math.round(A.frzHt)+"m":""),"var(--frz)");
  if(A.wbzP && Math.abs((A.wbzP||0)-(A.frzP||0))>15) markL(A.wbzP,"WBZ","var(--wbz)");

  // dot at surface
  g0.appendChild(el("circle",{cx:xOf(prof[0].T,prof[0].p),cy:yOf(prof[0].p),r:3.2,fill:"var(--temp)"}));
  g0.appendChild(el("circle",{cx:xOf(prof[0].Td,prof[0].p),cy:yOf(prof[0].p),r:3.2,fill:"var(--dew)"}));

  // ---- persistent draggable magnifier (scoped to this svg) ----
  CROSS_PROF = prof;
  const uid = svg.id==="chartBig" ? "big" : "main";
  const cg=el("g",{class:"crossLayer"});
  // horizontal level guide across the chart
  cg.appendChild(el("line",{class:"crossH",x1:X0,x2:X1,y1:0,y2:0,stroke:"var(--ink)","stroke-width":.8,"stroke-dasharray":"3 3",opacity:.5}));
  // --- magnifying lens: a circular clip + a scaled copy of the whole chart ---
  const defs=el("defs",{});
  const clip=el("clipPath",{id:"magClip_"+uid});
  clip.appendChild(el("circle",{class:"magClipC",r:LENS_R,cx:0,cy:0}));
  defs.appendChild(clip);
  cg.appendChild(defs);
  // backing disc (so the lens has a solid chart-coloured background even at chart edges)
  cg.appendChild(el("circle",{class:"magBack",r:LENS_R,fill:"#0d1322"}));
  // the zoomed chart, clipped to the lens circle
  const lensG=el("g",{class:"magLens","clip-path":"url(#magClip_"+uid+")"});
  const useEl=el("use",{class:"magUse",href:"#"+gid});
  useEl.setAttributeNS("http://www.w3.org/1999/xlink","href","#"+gid);
  lensG.appendChild(useEl);
  // markers snapping onto the temp & dew curves — inside the lens so they track the zoomed view
  lensG.appendChild(el("circle",{class:"crossT",r:4,fill:"none",stroke:"var(--temp)","stroke-width":2}));
  lensG.appendChild(el("circle",{class:"crossD",r:4,fill:"none",stroke:"var(--dew)","stroke-width":2}));
  // base markers on the UNZOOMED curves at the crosshair row — under the lens, so they stay
  // visible whenever the zoomed pair falls outside the lens (wide T–Td gap aloft)
  cg.appendChild(el("circle",{class:"crossT2",r:4,fill:"none",stroke:"var(--temp)","stroke-width":2}));
  cg.appendChild(el("circle",{class:"crossD2",r:4,fill:"none",stroke:"var(--dew)","stroke-width":2}));
  cg.appendChild(lensG);
  // the lens rim, crosshair lines, center dot
  cg.appendChild(el("circle",{class:"magRing",r:LENS_R,fill:"none",stroke:"var(--accent)","stroke-width":2}));
  cg.appendChild(el("line",{class:"magHx",stroke:"var(--accent)","stroke-width":.8,opacity:.7}));
  cg.appendChild(el("line",{class:"magVx",stroke:"var(--accent)","stroke-width":.8,opacity:.7}));
  cg.appendChild(el("circle",{class:"magDot",r:2.5,fill:"var(--accent)"}));
  svg.appendChild(cg);
  attachCrosshair(svg);
  // draw the puck at its remembered position (or default center of chart)
  positionMagnifier(svg);
}



/* ---------- persistent draggable magnifier ---------- */
let CROSS_PROF=null, CROSS_POS=null; // CROSS_POS in viewBox coords {x,y}
function interpProf(prof,p,key){
  for(let k=0;k<prof.length-1;k++){
    const a=prof[k],b=prof[k+1];
    if(a.p>=p && b.p<=p){
      const f=(Math.log(a.p)-Math.log(p))/(Math.log(a.p)-Math.log(b.p));
      const v=a[key], w=b[key];
      if(v==null||w==null)return v==null?w:v;
      if(key==="wd"){ let d=((w-v+540)%360)-180; return (v+d*f+360)%360; }
      return v+(w-v)*f;
    }
  }
  return p>=prof[0].p?prof[0][key]:prof[prof.length-1][key];
}
// render the magnifier + readout at CROSS_POS on the given svg
function drawMagnifier(svg){
  if(!CROSS_PROF||!CROSS_POS)return;
  const x=Math.max(X0,Math.min(X1,CROSS_POS.x));
  const y=Math.max(Y0,Math.min(Y1,CROSS_POS.y));
  const p=pOf(y);
  const T=interpProf(CROSS_PROF,p,"T"), Td=interpProf(CROSS_PROF,p,"Td");
  const ws=interpProf(CROSS_PROF,p,"ws"), wd=interpProf(CROSS_PROF,p,"wd");
  const ht=(typeof LAST_A!=="undefined"&&LAST_A&&LAST_A.htOfP)?LAST_A.htOfP(p):Math.round((CROSS_PROF[0].p-p)*8);
  const q=(sel)=>svg.querySelector(sel);
  const hLine=q(".crossH"); if(hLine){hLine.setAttribute("y1",y);hLine.setAttribute("y2",y);}
  const cT=q(".crossT"), cD=q(".crossD");
  // markers live inside the zoomed lens: map curve x through the same zoom around (x,y).
  // the crosshair row is the zoom centre row, so y maps to itself.
  const zx=(mx)=>x+(mx-x)*LENS_ZOOM;
  if(cT){ if(T!=null){cT.setAttribute("cx",zx(xOf(T,p)));cT.setAttribute("cy",y);cT.setAttribute("opacity","1");}else cT.setAttribute("opacity","0"); }
  if(cD){ if(Td!=null){cD.setAttribute("cx",zx(xOf(Td,p)));cD.setAttribute("cy",y);cD.setAttribute("opacity","1");}else cD.setAttribute("opacity","0"); }
  const cT2=q(".crossT2"), cD2=q(".crossD2");
  if(cT2){ if(T!=null){cT2.setAttribute("cx",xOf(T,p));cT2.setAttribute("cy",y);cT2.setAttribute("opacity","1");}else cT2.setAttribute("opacity","0"); }
  if(cD2){ if(Td!=null){cD2.setAttribute("cx",xOf(Td,p));cD2.setAttribute("cy",y);cD2.setAttribute("opacity","1");}else cD2.setAttribute("opacity","0"); }
  const ring=q(".magRing"), dot=q(".magDot"), hx=q(".magHx"), vx=q(".magVx");
  if(ring){ring.setAttribute("cx",x);ring.setAttribute("cy",y);}
  if(dot){dot.setAttribute("cx",x);dot.setAttribute("cy",y);}
  if(hx){hx.setAttribute("x1",x-LENS_R);hx.setAttribute("x2",x+LENS_R);hx.setAttribute("y1",y);hx.setAttribute("y2",y);}
  if(vx){vx.setAttribute("x1",x);vx.setAttribute("x2",x);vx.setAttribute("y1",y-LENS_R);vx.setAttribute("y2",y+LENS_R);}
  // position the lens circle + backing at the magnifier point
  const clipC=q(".magClipC"), back=q(".magBack");
  if(clipC){clipC.setAttribute("cx",x);clipC.setAttribute("cy",y);}
  if(back){back.setAttribute("cx",x);back.setAttribute("cy",y);}
  // zoom the chart copy around (x,y): translate(x,y) scale(Z) translate(-x,-y)
  const use=q(".magUse");
  if(use){ use.setAttribute("transform",`translate(${x} ${y}) scale(${LENS_ZOOM}) translate(${-x} ${-y})`); }
  const tip=document.getElementById(svg.id==="chartBig"?"crossTipBig":"crossTip");
  if(tip){
    const rh = (T!=null&&Td!=null)? Math.round(100*esat(Td)/esat(T)) : null;
    const mr = Td!=null? mixingRatioFromDew(Td,p) : null;
    // plain-language interpretation of this level
    let interp="";
    if(T!=null&&Td!=null){
      const spread=T-Td, bits=[];
      if(spread<=1)      bits.push(L("已饱和 — 此处正是云层","saturated — cloud layer here"));
      else if(spread<=3) bits.push(L("接近饱和 — 易成云","near saturation — cloud-prone"));
      else if(spread<=8) bits.push(L("较湿","fairly moist"));
      else               bits.push(L("干燥层 — 抑制云的发展","dry layer — suppresses cloud growth"));
      const A=(typeof LAST_A!=="undefined")?LAST_A:null;
      if(A){
        if(A.lclHt!=null && ht<A.lclHt)                bits.push(L("云底以下（近地层）","below cloud base"));
        else if(A.elHt!=null && ht>A.elHt)             bits.push(L("高于风暴顶","above storm top"));
        else if(A.lclHt!=null)                         bits.push(L("位于对流云可发展层内","inside the storm-growth layer"));
      }
      if(T<=0) bits.push(L("低于0°C（冰相）","below freezing (ice)"));
      if(ws!=null&&ws>=62) bits.push(L("强风层","strong-wind layer"));
      interp=`<span class="ttinterp">💡 ${bits.join(" · ")}</span>`;
    }
    tip.innerHTML=`<b>${Math.round(p)} hPa</b> · ~${ht} m`+
      `<span class="ttrow"><i style="background:var(--temp)"></i>T ${T!=null?T.toFixed(1):"—"}°C`+
      `<i style="background:var(--dew)"></i>Td ${Td!=null?Td.toFixed(1):"—"}°C${rh!=null?" · RH "+rh+"%":""}</span>`+
      (mr!=null?`<span class="ttrow"><i style="background:var(--mix)"></i>${L("混合比","Mixing ratio")} ${mr.toFixed(1)} g/kg</span>`:"")+
      (ws!=null?`<span class="ttrow"><i style="background:var(--wind)"></i>${L("风","Wind")} ${Math.round(ws)} km/h ${compass(wd)}</span>`:"")+
      interp;
    tip.style.opacity="1";
  }
}
// set default position if none, then draw
// find the level where dew point is closest to temperature (most saturated → cloud/LCL);
// returns a viewBox y. Scans levels plus fine interpolation between them.
function saturationY(prof){
  if(!prof||!prof.length) return yOf(700);
  let bestP=prof[0].p, bestGap=Infinity;
  // fine scan from surface up to 250 hPa
  const top=Math.max(250, prof[prof.length-1].p);
  for(let p=prof[0].p; p>=top; p-=2){
    const T=interpProf(prof,p,"T"), Td=interpProf(prof,p,"Td");
    if(T==null||Td==null) continue;
    const gap=T-Td;
    if(gap<bestGap){ bestGap=gap; bestP=p; }
  }
  return yOf(bestP);
}
function positionMagnifier(svg){
  if(!CROSS_POS){
    const y=saturationY(CROSS_PROF);
    // sit the puck on the temperature curve at that level (where the lines nearly touch)
    let x=(X0+X1)/2;
    if(CROSS_PROF){ const p=pOf(y), T=interpProf(CROSS_PROF,p,"T"); if(T!=null) x=Math.max(X0,Math.min(X1,xOf(T,p))); }
    CROSS_POS={ x, y };
  }
  drawMagnifier(svg);
}
function attachCrosshair(svg){
  if(svg.dataset.crossBound) return; svg.dataset.crossBound="1";
  const toVB=(clientX,clientY)=>{
    const rect=svg.getBoundingClientRect();
    return { x:(clientX-rect.left)/rect.width*500, y:(clientY-rect.top)/rect.height*560 };
  };
  const setPos=(clientX,clientY)=>{
    const {x,y}=toVB(clientX,clientY);
    CROSS_POS={ x:Math.max(X0,Math.min(X1,x)), y:Math.max(Y0,Math.min(Y1,y)) };
    drawMagnifier(svg);
  };
  svg.style.touchAction="none";
  svg.style.userSelect="none"; svg.style.webkitUserSelect="none";
  svg.style.webkitUserDrag="none"; svg.setAttribute("draggable","false");
  svg.addEventListener("dragstart",e=>e.preventDefault());
  svg.addEventListener("selectstart",e=>e.preventDefault());
  svg.addEventListener("contextmenu",e=>e.preventDefault());
  let active=false;
  svg.addEventListener("pointerdown",e=>{ active=true; try{svg.setPointerCapture(e.pointerId);}catch(_){} setPos(e.clientX,e.clientY); e.preventDefault(); },{passive:false});
  svg.addEventListener("pointermove",e=>{ if(active){ setPos(e.clientX,e.clientY); e.preventDefault(); } },{passive:false});
  const release=()=>{ active=false; };
  svg.addEventListener("pointerup",release);
  svg.addEventListener("pointercancel",release);
}

function windBarb(g,x,y,spd,dir){
  // knots
  const kt=spd*0.539957;
  const ang=(dir+180)*Math.PI/180; // wind FROM dir
  const dx=Math.sin(ang), dy=-Math.cos(ang);
  const L=22;
  const ex=x+dx*L, ey=y+dy*L;
  g.appendChild(line(x,y,ex,ey,"var(--wind)",1.1));
  let rem=Math.round(kt/5)*5;
  const step=4.2, bl=8;
  const perpx=-dy,perpy=dx;
  // draw flags/barbs from outer end inward
  let cx=ex, cy=ey;
  while(rem>=50){
    g.appendChild(el("polygon",{points:`${cx},${cy} ${cx+perpx*bl+dx*(-step)},${cy+perpy*bl+dy*(-step)} ${cx+dx*(-step)},${cy+dy*(-step)}`,fill:"var(--wind)"}));
    cx+=dx*(-step*1.4);cy+=dy*(-step*1.4);rem-=50;
  }
  while(rem>=10){
    g.appendChild(line(cx,cy,cx+perpx*bl+dx*(-step),cy+perpy*bl+dy*(-step),"var(--wind)",1.1));
    cx+=dx*(-step);cy+=dy*(-step);rem-=10;
  }
  if(rem>=5){
    g.appendChild(line(cx,cy,cx+perpx*(bl*0.55)+dx*(-step*0.55),cy+perpy*(bl*0.55)+dy*(-step*0.55),"var(--wind)",1.1));
  }
}

/* ---------- hodograph ---------- */
let TH_GEO=null;
function updateThCursor(i){
  const m=document.getElementById("thCurMark");
  if(m&&TH_GEO) m.setAttribute("x",(TH_GEO.x0+(i-HR_START)*TH_GEO.cw).toFixed(1));
}
function drawTimeHeight(){
  const svg=document.getElementById("thchart"); if(!svg||!DATA)return;
  svg.innerHTML="";
  const h=DATA.hourly, X0t=42,X1t=352,Y0t=10,Y1t=218;
  const lnTop=Math.log(150), lnBot=Math.log(1000);
  const yOfP=p=>Y0t+(Math.log(p)-lnTop)/(lnBot-lnTop)*(Y1t-Y0t);
  const n=HR_END-HR_START+1, cw=(X1t-X0t)/n;
  const g=el("g",{}); svg.appendChild(g);
  // pressure gridline labels
  for(const p of [1000,850,700,500,300,200,150]){
    const y=yOfP(p);
    g.appendChild(line(X0t,y,X1t,y,"var(--line)",0.6));
    g.appendChild(txt(X0t-4,y+3,String(p),'tick',"end","var(--faint)"));
  }
  // humidity cells
  for(let i=HR_START;i<=HR_END;i++){
    const x=X0t+(i-HR_START)*cw;
    for(let k=0;k<LEVELS.length-1;k++){
      const p1=LEVELS[k],p2=LEVELS[k+1];
      const arr=h[`relative_humidity_${p1}hPa`];
      const rh=arr?arr[i]:null;
      if(rh==null)continue;
      const al=Math.max(0,Math.min(1,(rh-45)/55));
      if(al<=0.03)continue;
      const y1=yOfP(p1),y2=yOfP(p2);
      g.appendChild(el("rect",{x:x.toFixed(1),y:Math.min(y1,y2).toFixed(1),width:(cw+0.4).toFixed(1),height:Math.abs(y2-y1).toFixed(1),fill:"#7fb4ff",opacity:(0.08+0.62*al).toFixed(2)}));
    }
  }
  // freezing level line across the day
  const fz=[];
  for(let i=HR_START;i<=HR_END;i++){
    let fp=null;
    for(let k=0;k<LEVELS.length-1;k++){
      const a=h[`temperature_${LEVELS[k]}hPa`], b=h[`temperature_${LEVELS[k+1]}hPa`];
      if(!a||!b||a[i]==null||b[i]==null)continue;
      if(a[i]>=0&&b[i]<0){ const f=a[i]/(a[i]-b[i]); fp=LEVELS[k]+(LEVELS[k+1]-LEVELS[k])*f; break; }
    }
    if(fp)fz.push([X0t+(i-HR_START+0.5)*cw,yOfP(fp)]);
  }
  if(fz.length>1)g.appendChild(poly(fz,"var(--frz)",1.2,"4 3"));
  // hour ticks + current marker
  for(let i=HR_START;i<=HR_END;i++){
    if((i-HR_START)%6===0){
      const x=X0t+(i-HR_START)*cw;
      g.appendChild(txt(x+cw/2,Y1t+14,fmtHour(h.time[i]),'tick',"middle","var(--faint)"));
    }
  }
  const cx=X0t+(CUR_I-HR_START)*cw;
  TH_GEO={x0:X0t,cw};
  g.appendChild(el("rect",{id:"thCurMark",x:cx.toFixed(1),y:Y0t,width:cw.toFixed(1),height:(Y1t-Y0t).toFixed(1),fill:"none",stroke:"var(--accent)","stroke-width":1.6,rx:2}));
  // tap a column to jump to that hour
  const hit=el("rect",{x:X0t,y:Y0t,width:(X1t-X0t),height:(Y1t-Y0t),fill:"transparent"});
  hit.style.cursor="pointer";
  hit.addEventListener("click",ev=>{
    const r=svg.getBoundingClientRect();
    const fx=(ev.clientX-r.left)/r.width*360;
    const i=HR_START+Math.max(0,Math.min(n-1,Math.floor((fx-X0t)/cw)));
    showHour(i);
  });
  g.appendChild(hit);
}
function drawHodograph(A){
  const svg=document.getElementById("hodo"); if(!svg)return;
  svg.innerHTML="";
  const cx=150,cy=150, W=A.profWind||[];
  if(W.length<3){
    const l1 = modelIsSurfaceOnly()
      ? L(`${modelShort()} 为地面模式`,`${modelShort()} is surface-only`)
      : L("此模式暂无高空风数据","No upper-air wind data");
    svg.appendChild(txt(150,140,l1,'axl',"middle","var(--warn)"));
    svg.appendChild(txt(150,158,L("高空风请选 IFS 0.25°／AIFS／GFS","For winds aloft pick IFS 0.25°, AIFS or GFS"),'axl',"middle","var(--faint)"));
    return;
  }
  // gather previous-hours' wind profiles as "ghosts" (up to 3 back) so we can see the wind trend
  const ghosts=[];
  if(typeof DATA!=="undefined" && DATA && typeof CUR_I==="number"){
    for(let k=1;k<=3;k++){
      const gi=CUR_I-k; if(gi<0)break;
      try{ const gp=analyze(buildProfile(DATA,gi)).profWind||[]; if(gp.length) ghosts.push(gp); }catch(e){}
    }
  }
  // scale must fit the current curve AND every ghost so nothing clips
  let maxV=10;
  W.forEach(w=>{maxV=Math.max(maxV,Math.hypot(w.uv.u,w.uv.v));});
  ghosts.forEach(G=>G.forEach(w=>{maxV=Math.max(maxV,Math.hypot(w.uv.u,w.uv.v));}));
  if(WIND_SCALE_MAX) maxV=Math.max(maxV,WIND_SCALE_MAX);   // same frozen day scale as the wind profile
  const R=130/maxV;
  const g=el("g",{}); svg.appendChild(g);
  // range rings every 20 km/h
  for(let r=20;r<=maxV+20;r+=20){
    const rr=r*R; if(rr>135)break;
    g.appendChild(el("circle",{cx,cy,r:rr,fill:"none",stroke:"var(--line)","stroke-width":.7}));
    const dg=rr*0.7071;   // ring labels along the NE diagonal so they never collide with E
    g.appendChild(txt(cx+dg+3,cy-dg-3,r+"",'tick',"start","var(--faint)"));
  }
  // axes + compass labels (N up)
  g.appendChild(line(cx-135,cy,cx+135,cy,"var(--line)",.7));
  g.appendChild(line(cx,cy-135,cx,cy+135,"var(--line)",.7));
  [["N",cx,cy-140],["S",cx,cy+146],["E",cx+140,cy+4],["W",cx-140,cy+4]].forEach(([t,x,y])=>
    g.appendChild(txt(x,y,t,'axl',"middle","var(--dim)")));
  // ghost trails: older hours fainter, drawn UNDER the current curve
  ghosts.forEach((G,idx)=>{
    const op = 0.30 - idx*0.08;           // 1h ago .30, 2h .22, 3h .14
    const gp = G.map(w=>[cx+w.uv.u*R, cy-w.uv.v*R]);
    if(gp.length>1){ const pl=poly(gp,"var(--wind)",1.4); pl.setAttribute("opacity",op.toFixed(2)); g.appendChild(pl); }
  });
  // plot the CURRENT hour: on a hodograph, east wind = x, north = y (v points north)
  const pts=W.map(w=>[cx+w.uv.u*R, cy-w.uv.v*R]);
  if(pts.length>1) g.appendChild(poly(pts,"var(--wind)",2.4));
  // colour segments by height band, dots + a couple labels
  // label "~6km" on exactly ONE dot: the level nearest 6000 m (within 2 km tolerance)
  let SIX_I=-1,SIX_D=2000;
  W.forEach((w,i)=>{ const d=Math.abs((w.ht||0)-6000); if(w.ht!=null&&d<SIX_D){SIX_D=d;SIX_I=i;} });
  W.forEach((w,i)=>{
    const x=cx+w.uv.u*R, y=cy-w.uv.v*R;
    const col = w.ht<1000?"var(--dew)": w.ht<3000?"var(--parcel)": w.ht<6000?"var(--warn)":"var(--danger)";
    g.appendChild(el("circle",{cx:x,cy:y,r:3.4,fill:col}));
    if(i===0) g.appendChild(txt(x-6,y+3,L("地面","sfc"),'gl-lbl',"end","var(--dew)"));
    if(i===SIX_I) g.appendChild(txt(x+6,y,"~6km",'gl-lbl',"start","var(--warn)"));
  });
}

/* vertical wind-speed profile: speed (x) vs pressure (y, log like the sounding) */
function drawWindProfile(A){
  const svg=document.getElementById("windprof"); if(!svg)return;
  svg.innerHTML="";
  const W=(A.profWind||[]).filter(w=>w.ws!=null && w.ht!=null);
  if(W.length<3){
    const l1w = modelIsSurfaceOnly()
      ? L(`${modelShort()} 为地面模式`,`${modelShort()} is surface-only`)
      : L("此模式暂无高空风数据","No upper-air wind data");
    svg.appendChild(txt(150,160,l1w,'axl',"middle","var(--warn)"));
    svg.appendChild(txt(150,178,L("高空风请选 IFS 0.25°／AIFS／GFS","For winds aloft pick IFS 0.25°, AIFS or GFS"),'axl',"middle","var(--faint)"));
    return;
  }
  if(!W.length){ return; }
  const PX0=52, PX1=278, PY0=18, PY1=308;         // plot box
  // height axis (km), surface at bottom, up to the top of the wind data (rounded up to 2 km)
  let maxH=0; W.forEach(w=>maxH=Math.max(maxH,w.ht));
  let hTopKm=Math.max(4, Math.ceil((maxH/1000)/2)*2); // km, at least 4, rounded to even
  if(HT_SCALE_MAX) hTopKm=Math.max(hTopKm,HT_SCALE_MAX);   // frozen across the day
  const yOfh=km=>PY1-(PY1-PY0)*(km/hTopKm);       // 0 km at bottom, hTopKm at top
  let maxV=20; W.forEach(w=>maxV=Math.max(maxV,w.ws));
  maxV=Math.ceil(maxV/20)*20;                       // round up to nearest 20
  if(WIND_SCALE_MAX) maxV=Math.max(maxV,WIND_SCALE_MAX);   // frozen across the day — no rescaling while scrubbing
  const xOfv=v=>PX0+(PX1-PX0)*(v/maxV);
  const g=el("g",{}); svg.appendChild(g);
  // frame
  g.appendChild(el("rect",{x:PX0,y:PY0,width:PX1-PX0,height:PY1-PY0,fill:"#0d1322",stroke:"var(--line)"}));
  // height gridlines + labels (every 2 km)
  for(let km=0;km<=hTopKm;km+=2){ const y=yOfh(km);
    g.appendChild(line(PX0,y,PX1,y,"var(--line)",.5));
    g.appendChild(txt(PX0-6,y+3,km+"",'tick',"end")); }
  // speed gridlines + labels
  for(let v=0;v<=maxV;v+=20){ const x=xOfv(v);
    g.appendChild(line(x,PY0,x,PY1,"var(--line)",.4));
    g.appendChild(txt(x,PY1+14,v+"",'tick',"middle")); }
  // reference lines: 50 kt ≈ 93 km/h (strong wind) and ~65 kt ≈ 120 km/h (true jet-stream strength)
  const WINDMAX_KMH=93, JET_KMH=120, JET_MIN_HT=8000; // jet = fast AND high (≥8 km)
  if(maxV>=WINDMAX_KMH){
    const jx=xOfv(WINDMAX_KMH);
    g.appendChild(el("line",{x1:jx,y1:PY0,x2:jx,y2:PY1,stroke:"var(--warn)","stroke-width":1,"stroke-dasharray":"4 3",opacity:.55}));
    g.appendChild(txt(jx,PY0-4,L("强风 ≥93","strong ≥93"),'gl-lbl',"middle","var(--warn)"));
  }
  if(maxV>=JET_KMH){
    const jx=xOfv(JET_KMH);
    g.appendChild(el("line",{x1:jx,y1:PY0,x2:jx,y2:PY1,stroke:"var(--danger)","stroke-width":1,"stroke-dasharray":"4 3",opacity:.7}));
    g.appendChild(txt(jx,PY0-4,L("急流 ≥120","jet ≥120"),'gl-lbl',"middle","var(--danger)"));
  }
  // axis titles
  const yl=txt(16,(PY0+PY1)/2,L("高度 (km)","HEIGHT (km)"),LANG==="zh"?'axl-zh':'axl',"middle"); yl.setAttribute("transform",`rotate(-90 16 ${(PY0+PY1)/2})`); g.appendChild(yl);
  g.appendChild(txt((PX0+PX1)/2,PY1+30,L("风速 (km/h)","WIND SPEED (km/h)"),LANG==="zh"?'axl-zh':'axl'));
  // the profile curve
  const inRange=W.filter(w=>w.ht<=hTopKm*1000);
  const pts=inRange.map(w=>[xOfv(w.ws), yOfh(w.ht/1000)]);
  if(pts.length>1) g.appendChild(poly(pts,"var(--wind)",2.4));
  // dots coloured by height band
  inRange.forEach(w=>{ const x=xOfv(w.ws), y=yOfh(w.ht/1000);
    const col = w.ht<1000?"var(--dew)": w.ht<3000?"var(--parcel)": w.ht<6000?"var(--warn)":"var(--danger)";
    g.appendChild(el("circle",{cx:x,cy:y,r:3,fill:col})); });
  // wind-max / jet detection: find the strongest wind aloft (≥5 km)
  const aloft=inRange.filter(w=>w.ht>=5000);
  if(aloft.length){
    let peak=aloft[0]; aloft.forEach(w=>{ if(w.ws>peak.ws) peak=w; });
    const isTrueJet = peak.ws>=JET_KMH && peak.ht>=JET_MIN_HT;   // fast AND high
    const isStrong  = peak.ws>=WINDMAX_KMH;
    if(isTrueJet || isStrong){
      const col = isTrueJet ? "var(--danger)" : "var(--warn)";
      const label = isTrueJet ? L(`急流 ${Math.round(peak.ws)} km/h`,`JET ${Math.round(peak.ws)} km/h`) : L(`风速极值 ${Math.round(peak.ws)} km/h`,`wind max ${Math.round(peak.ws)} km/h`);
      const jxp=xOfv(peak.ws), jyp=yOfh(peak.ht/1000);
      g.appendChild(el("circle",{cx:jxp,cy:jyp,r:5,fill:"none",stroke:col,"stroke-width":1.6}));
      const rightSide = jxp>PX1-70;
      const lx=rightSide? jxp-8 : jxp+8;
      g.appendChild(txt(lx,jyp-6,label,'gl-lbl', rightSide?"end":"start",col));
      g.appendChild(txt(lx,jyp+8,`~${(peak.ht/1000).toFixed(1)} km`,'gl-lbl', rightSide?"end":"start","var(--faint)"));
    }
  }
}

/* ---------- verdict + cards ---------- */
function pill(txt,col){return `<span class="pill" style="background:${col};color:#12060a">${txt}</span>`;}
function capeVerdict(c){
  if(c<100)return[L("稳定","Stable"),L("没有可用的风暴能量 — 气块不会自行上升。","No meaningful storm fuel — parcels won't rise on their own."),"var(--dew)"];
  if(c<500)return[L("边缘","Marginal"),L("不稳定度弱；有触发时可能出现零星阵雨。","Weak instability; isolated showers possible with a trigger."),"var(--parcel)"];
  if(c<1500)return[L("中等","Moderate"),L("只要有抬升，就有真实的雷暴潜势。","Real thunderstorm potential if something lifts the air."),"var(--warn)"];
  if(c<2500)return[L("强","Strong"),L("很可能出现旺盛雷暴；提防强降雨。","Vigorous storms likely; watch for heavy downpours."),"var(--danger)"];
  return[L("极端","Extreme"),L("爆发性不稳定 — 强对流环境。","Explosive instability — severe storm environment."),"var(--danger)"];
}
function compass(deg){
  if(deg==null)return "—";
  const dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(deg/22.5)%16];
}
function windWord(kmh){
  if(kmh==null)return "";
  if(kmh<1)return L("无风","Calm"); if(kmh<12)return L("微风","Light breeze"); if(kmh<20)return L("轻风","Gentle breeze");
  if(kmh<29)return L("和风","Moderate breeze"); if(kmh<39)return L("清风","Fresh breeze"); if(kmh<50)return L("强风","Strong breeze");
  if(kmh<62)return L("疾风","Near gale"); return L("大风+","Gale+");
}
function fogAssess(P){
  const code=P.wcode, vis=P.vis, rh=P.rhSfc, spread=(P.Tsfc!=null&&P.Tdsfc!=null)?(P.Tsfc-P.Tdsfc):null, w=P.windSpd;
  if(code===45||code===48) return [L("预报有雾","Fog reported"),"var(--danger)",L("模式预报此小时有雾。","The model is forecasting fog this hour.")];
  if(vis!=null && vis<1000) return [L("很可能有雾","Fog likely"),"var(--danger)",L("能见度低于1公里且空气饱和。","Visibility under 1 km with saturated air.")];
  if(vis!=null && vis<4000) return [L("轻雾/霾","Mist / haze"),"var(--warn)",L("能见度下降（","Reduced visibility (")+(vis/1000).toFixed(1)+L(" 公里）。"," km).")];
  if(spread!=null && spread<=2 && rh>=95 && (w==null||w<10))
    return [L("有雾风险","Fog risk"),"var(--warn)",L("空气接近饱和且风力轻 — 典型起雾条件，黎明前后尤甚。","Air is nearly saturated with light winds — classic fog setup, especially near dawn.")];
  return [L("空气通透","Clear air"),"var(--dew)",L("无雾信号；能见度良好。","No fog signal; visibility is good.")];
}
function cloudWord(pct){
  if(pct==null)return "—";
  if(pct<10)return L("晴","Clear"); if(pct<30)return L("大致晴","Mostly clear"); if(pct<60)return L("局部多云","Partly cloudy");
  if(pct<85)return L("多云","Mostly cloudy"); return L("阴天","Overcast");
}
// interpretive words for teaching indices
function liWord(v){ if(v==null)return""; if(v>0)return L("稳定","stable"); if(v>-3)return L("弱不稳定","marginally unstable"); if(v>-6)return L("不稳定","unstable"); return L("非常不稳定","very unstable"); }
function kiWord(v){ if(v==null)return""; if(v<20)return L("雷暴可能性低","storms unlikely"); if(v<26)return L("约20%雷暴概率","~20% storm chance"); if(v<31)return L("约40%","~40%"); if(v<36)return L("约60%","~60%"); if(v<41)return L("约80%","~80%"); return L("雷暴几乎必然","storms near-certain"); }

function lapseWord(v){ if(v==null)return""; if(v<6)return L("稳定层","stable layer"); if(v<7)return L("边缘","marginal"); if(v<8)return L("条件性不稳定","conditionally unstable"); return L("陡峭 — 不稳定","steep — unstable"); }
function shearWord(kmh){ if(kmh==null)return""; if(kmh<20)return L("弱 — 脉冲风暴","weak — pulse storms"); if(kmh<37)return L("中等 — 有组织","moderate — organized"); if(kmh<56)return L("强 — 可出现超级单体","strong — supercell-capable"); return L("极端切变","extreme shear"); }

    ]],

      [`CAPE (${parcelTag()})`,fmt(A.cape,0),"J/kg",L("浮力能量 — 红色阴影面积。最重要的风暴燃料指标。","Buoyant energy — the shaded red area. The single best storm-fuel gauge.")],
      [L("CAPE 三气块","CAPE 3 parcels"),`${fmt(A.capeSB,0)} / ${fmt(A.capeML,0)} / ${fmt(A.capeMU,0)}`,"J/kg",L(`SB / ML / MU 三种气块对比。MU 远大于 SB＝逆温上方藏有燃料（清晨常见）${A.muStartP?` — MU 起点 ${Math.round(A.muStartP)} hPa`:""}。`,`Surface / Mixed-layer / Most-unstable compared. MU ≫ SB = fuel hiding above an inversion (common mornings)${A.muStartP?` — MU starts at ${Math.round(A.muStartP)} hPa`:""}.`)],
      [`CIN (${parcelTag()})`,fmt(A.cin,0),"J/kg",L("“盖子”的强度。负值越大，越需先破盖。","The 'cap' resisting storms. Strongly negative = lid must break first.")],
      ["DCAPE",fmt(A.dcape,0),"J/kg",L(`下沉气流能量 — 雨水蒸发冷却后砸向地面的力度。${dcapeWord(A.dcape)}${A.dcapeP?`（起点 ${Math.round(A.dcapeP)} hPa）`:""}。`,`Downdraft energy — how hard rain-cooled air can crash down. ${dcapeWord(A.dcape)}${A.dcapeP?` (from ${Math.round(A.dcapeP)} hPa)`:""}.`)],
      [L("抬升指数 LI","Lifted Index"),fmt(A.LI,1),"°C",L(`500 hPa处气块与环境之差。${liWord(A.LI)}（负值=不稳定）。`,`Parcel vs environment at 500 hPa. ${liWord(A.LI)} (negative = unstable).`)],
      [L("K指数","K-Index"),fmt(A.KI,0),"",L(`水汽+中层递减率。${kiWord(A.KI)}。`,`Moisture + mid-level lapse. ${kiWord(A.KI)}.`)],
      [L("总指数 TT","Total Totals"),fmt(A.TT,0),"",L(`经典雷暴指数。${ttWord(A.TT)}。`,`Classic thunderstorm index. ${ttWord(A.TT)}.`)],
      ["Showalter",fmt(A.SI,1),"°C",L("从850 hPa抬升。负值=高空不稳定。","Lift from 850 hPa. Negative = unstable aloft.")],
      [L("递减率 700–500","Lapse 700–500"),fmt(A.lr700_500,1),"°C/km",L(`中层降温速率。${lapseWord(A.lr700_500)}。`,`Mid-level cooling rate. ${lapseWord(A.lr700_500)}.`)],
      [L("递减率 850–500","Lapse 850–500"),fmt(A.lr850_500,1),"°C/km",L(`中低层降温速率。${lapseWord(A.lr850_500)}。`,`Low-mid cooling rate. ${lapseWord(A.lr850_500)}.`)],
    ]],
    [L("关键高度","Key levels & heights"),[
      [L("云底 (LCL)","Cloud base (LCL)"),fmt(A.lclHt,0),"m",L("抬升凝结高度 — 地面空气最先成云之处。","Lifted Condensation Level — where surface air first makes cloud.")],
      ["LFC",A.lfcHt!=null?fmt(A.lfcHt,0):"—","m",L("自由对流高度 — 越过此处气块自行上升。","Level of Free Convection — above here a parcel rises on its own.")],
      [L("风暴顶 (EL)","Storm top (EL)"),A.elHt!=null?fmt(A.elHt,0):(A.elAbove?">"+fmt(A.topHt,0):"—"),"m",L(A.elAbove&&A.elHt==null?"气块在图顶仍具浮力 — 风暴顶高于数据顶端。":"平衡高度 — 大致为雷暴/砧状云顶。",A.elAbove&&A.elHt==null?"Parcel still buoyant at the top of the data — storm top is above it.":"Equilibrium Level — roughly the anvil/thunderstorm top.")],
      [L("冻结层","Freezing level"),A.frzHt!=null?fmt(A.frzHt,0):"—","m",L("0°C线的高度。关系冰雹与融化。","Height of the 0 °C line. Matters for hail and melting.")],
      [L("湿球零度","Wet-bulb zero"),A.wbzHt!=null?fmt(A.wbzHt,0):"—","m",L("湿球0°C高度 — 冰雹尺寸的指标。","Wet-bulb 0 °C height — a hail-size indicator.")],
      [L("对流温度","Convective temp"),fmt(A.convT,1),"°C",L("仅靠日晒触发对流所需的地面温度。","Surface temp needed to spark convection without a push.")],
    ]],
    [L("风与切变","Wind & shear"),[
      [L("地面风","Surface wind"),P.windSpd!=null?fmt(P.windSpd,0):"—","km/h",L(`来自${compass(P.windDir)}。${windWord(P.windSpd)}。`,`From ${compass(P.windDir)}. ${windWord(P.windSpd)}.`)],
      [L("阵风","Wind gusts"),P.gust!=null?fmt(P.gust,0):"—","km/h",L("本小时的短时最大阵风。","Peak short gusts this hour.")],
      [L("0–6 km 切变","0–6 km shear"),A.shear!=null?fmt(A.shear,0):"—","km/h",L(`地面到风暴层的风变化。${shearWord(A.shear)}。`,`Wind change ground→storm level. ${shearWord(A.shear)}.`)],
      [L("总云量","Total cloud"),fmt(P.cloud,0),"%",L(`头顶${cloudWord(P.cloud)}。`,`${cloudWord(P.cloud)} overhead.`)],
      [L("云 低/中/高","Cloud L/M/H"),`${fmt(P.cloudLow)}/${fmt(P.cloudMid)}/${fmt(P.cloudHigh)}`,"%",L("低/中/高三层云量。","Low / mid / high cloud split.")],
      [L("能见度","Visibility"),P.vis!=null?fmt(P.vis/1000,1):"—","km",fogLbl+L("。",".")],
    ]],
  ];
  document.getElementById("cards").innerHTML=sections.map(([title,cards])=>
    `<div class="cardsect">${title}</div><div class="cardgrid">`+
    cards.map(c=>`<div class="card"><div class="k">${c[0]}</div><div class="v">${c[1]}<span class="u"> ${c[2]}</span></div><div class="d">${c[3]}</div></div>`).join("")+
    `</div>`).join("");
  drawHodograph(A);
  drawWindProfile(A);
  renderIngredients(P,A);
}

/* ---------- storm-spotting ingredients ---------- */
function renderIngredients(P,A){
  // Each ingredient: score 0 (no) / 1 (some) / 2 (yes), with a plain reason.
  const ing=[];
  // 1. MOISTURE — is there enough water?
  const S=stormScores(P,A);
  const pw=A.pw, dd=A.dd;
  const mScore=S.m;
  ing.push(["💧",L("水汽","Moisture"),L("空气中的水够吗？","Is there enough water in the air?"),mScore,
    pw>=45?L(`非常潮湿 — 整层水量 ${pw.toFixed(0)} mm，露点差仅 ${dd.toFixed(0)}°C，足以成雨。`,`Very moist — ${pw.toFixed(0)} mm of column water, dew-point gap only ${dd.toFixed(0)}°C. Plenty to rain out.`)
    : pw>=30?L(`中等 — 整层水量 ${pw.toFixed(0)} mm。有些燃料，但不算湿透。`,`Moderate — ${pw.toFixed(0)} mm column water. Some fuel, but not soaking.`)
    : L(`干燥 — 整层水量仅 ${pw.toFixed(0)} mm，难以成雨。`,`Dry — only ${pw.toFixed(0)} mm column water. Little to rain out.`)]);
  // 2. INSTABILITY — will air rise on its own?
  const cape=A.cape, li=A.LI, ki=A.KI;
  const iScore=S.i;
  ing.push(["🔥",L("不稳定","Instability"),L("被抬升的空气会继续上升吗？","Will lifted air keep rising?"),iScore,
    iScore===2?L(`强 — CAPE ${Math.round(cape)} J/kg，LI ${li!=null?li.toFixed(1):"—"}。空气蓄势上冲。`,`Strong — CAPE ${Math.round(cape)} J/kg, LI ${li!=null?li.toFixed(1):"—"}. Air wants to shoot upward.`)
    : iScore===1?L(`一般 — CAPE ${Math.round(cape)}，K指数 ${ki!=null?Math.round(ki):"—"}。有推力时可能起暴。`,`Some — CAPE ${Math.round(cape)}, K-Index ${ki!=null?Math.round(ki):"—"}. Storms possible with a nudge.`)
    : L(`稳定 — CAPE ${Math.round(cape)}。空气抗拒上升；当前风暴风险小。`,`Stable — CAPE ${Math.round(cape)}. Air resists rising; little storm risk now.`)]);
  // 3. LIFT / CAP — can it get started?
  const cin=A.cin, convT=A.convT, Tnow=P.Tsfc;
  const capStrong = cin<=-50;
  const canHeat = (Tnow!=null && convT!=null && Tnow>=convT-1);
  const lScore=S.l;
  ing.push(["⬆️",L("触发","Trigger"),L("风暴真能启动吗？","Can a storm actually start?"),lScore,
    capStrong?L(`被盖住 — ${Math.round(cin)} J/kg 的抑制能压着大气。破盖前风暴受阻。`,`Capped — ${Math.round(cin)} J/kg of inhibition is lidding the atmosphere. Storms held back until it breaks.`)
    : canHeat?L(`就绪 — 地面已接近 ${convT.toFixed(0)}°C 对流温度，白天加热即可点火。`,`Ready — surface is near the ${convT.toFixed(0)}°C convective temp, so daytime heating can set it off.`)
    : L(`弱盖 — 需要锋面、海风或山地强迫抬升。`,`Weak cap — needs a front, sea breeze, or hills to force air up.`)]);
  // 4. SHEAR — will storms organize / last?
  const sh=A.shear;
  const sScore=S.s;
  ing.push(["🌀",L("组织性","Organization"),L("风暴会持续还是一闪而过？","Will storms last or just pulse?"),sScore,
    sh==null?L(`切变未知。`,`Shear unknown.`)
    : sh>=37?L(`强切变（${Math.round(sh)} km/h）— 风暴可组织化并持续数小时。`,`Strong shear (${Math.round(sh)} km/h) — storms can organize and persist for hours.`)
    : sh>=20?L(`中等切变（${Math.round(sh)} km/h）— 有一定结构，多单体簇。`,`Moderate shear (${Math.round(sh)} km/h) — some structure, multi-cell clusters.`)
    : L(`弱切变（${Math.round(sh)} km/h）— 短暂的单体脉冲，雨来得快去得快。`,`Weak shear (${Math.round(sh)} km/h) — brief single-cell pulses that rain out fast.`)]);

  // bottom line
  const [verdict,vcol]=stormVerdict(S.branch);

  const dot=s=>`<span class="idot ${s===2?'yes':s===1?'maybe':'no'}">${s===2?'●':s===1?'◐':'○'}</span>`;
  document.getElementById("ingredients").innerHTML=
    `<div class="cardsect">${L("会下雨/雷暴吗？","Is a storm coming?")}</div>`+
    `<div class="ingpanel">`+
    `<div class="ingverdict" style="border-color:${vcol}">${verdict}</div>`+
    ing.map(([ic,name,q,score,reason])=>
      `<div class="ingrow"><div class="ingic">${ic}</div><div class="ingbody"><div class="ingname">${name} ${dot(score)}</div><div class="ingq">${q}</div><div class="ingreason">${reason}</div></div></div>`
    ).join("")+
    `<div class="ingfoot">${L("风暴需要<b>水汽 + 不稳定 + 触发</b>三者同时具备。切变决定它是短阵雨还是有组织的持久风暴。拖动上方小时条，观察要素如何汇聚。","A storm needs all three of <b>moisture + instability + a trigger</b> at once. Shear decides whether it's a quick shower or an organized, longer-lived storm. Step through the hours above to watch the ingredients come together.")}</div>`+
    `</div>`;
}

/* ---------- farm store ---------- */
const LS_USER="skewt.userFarms.v1", LS_DEL="skewt.deleted.v1", LS_PURGE="skewt.purgedSeeds.v1";
function loadUserFarms(){try{return JSON.parse(localStorage.getItem(LS_USER)||"[]");}catch(e){return [];}}
function saveUserFarms(a){try{localStorage.setItem(LS_USER,JSON.stringify(a));}catch(e){}}
function loadDeleted(){try{return JSON.parse(localStorage.getItem(LS_DEL)||"[]");}catch(e){return [];}}
function saveDeleted(a){try{localStorage.setItem(LS_DEL,JSON.stringify(a));}catch(e){}}
function loadPurged(){try{return JSON.parse(localStorage.getItem(LS_PURGE)||"[]");}catch(e){return [];}}
function savePurged(a){try{localStorage.setItem(LS_PURGE,JSON.stringify(a));}catch(e){}}
// unified list. seed farms get id "s<idx>"; user farms get their own id.
function allFarms(){
  const del=new Set(loadDeleted()), purged=new Set(loadPurged());
  const seed=SEED_FARMS.map((f,i)=>({id:"s"+i,name:f[0],lat:f[1],lng:f[2],region:f[3],seed:true,deleted:del.has("s"+i)}))
                       .filter(f=>!purged.has(f.id));
  const user=loadUserFarms().map(f=>({...f,seed:false,deleted:!!f.deleted}));
  return seed.concat(user);
}
function activeFarms(){return allFarms().filter(f=>!f.deleted);}

function farmById(id){return allFarms().find(f=>f.id===id);}

/* ---------- main farm list (filterable region accordion) ---------- */
let OPEN_REGIONS=new Set(), FILTER="", ACTIVE_ID=null;
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function renderList(){
  const list=document.getElementById("mList");
  const lhc=document.getElementById("lhCount"); if(lhc)lhc.textContent=activeFarms().length;
  const filtering=FILTER.trim().length>0;
  const q=FILTER.trim().toLowerCase();
  let farms=activeFarms();
  if(filtering) farms=farms.filter(f=>(f.name+" "+(f.region||"")).toLowerCase().includes(q));

  const groups={}, order=[];
  farms.forEach(f=>{const r=f.region||L("其他","Other");if(!groups[r]){groups[r]=[];order.push(r);}groups[r].push(f);});

  const card=f=>{
    const fm=FARM_MODELS[String(f.id)]||f.model||"";
    const opts=`<option value=""${fm===""?" selected":""}>${L("自动","Auto")}</option>`+
      MODELS.map(m=>`<option value="${m.api}"${m.api===fm?" selected":""}>${m.short}</option>`).join("");
    return `<div class="frow${f.id===ACTIVE_ID?" active":""}" data-id="${f.id}"><div class="fn">${esc(f.name)}<small>${f.lat.toFixed(4)}, ${f.lng.toFixed(4)}</small></div><select class="rowmodel" data-id="${f.id}" title="${L('该果园的默认天气模式','Default weather model for this farm')}">${opts}</select></div>`;
  };

  list.innerHTML = order.length ? order.map(r=>{
    const open = filtering || OPEN_REGIONS.has(r);
    return `<div class="rgroup">`+
      `<button class="ghead${open?" open":""}" data-region="${esc(r)}"><span class="gcar">${open?"▾":"▸"}</span><span class="gname">${esc(r)}</span><span class="gcount">${groups[r].length}</span></button>`+
      (open?`<div class="gbody">${groups[r].map(card).join("")}</div>`:"")+
    `</div>`;
  }).join("") : `<div style="padding:16px;color:var(--faint);font-size:13px">No farms match “${esc(FILTER)}”.</div>`;

  list.querySelectorAll(".ghead").forEach(h=>h.onclick=()=>{
    const r=h.dataset.region;
    if(OPEN_REGIONS.has(r))OPEN_REGIONS.delete(r);else OPEN_REGIONS.add(r);
    renderList();
  });
  list.querySelectorAll(".frow").forEach(row=>row.onclick=()=>{
    const f=farmById(row.dataset.id); if(f){ACTIVE_ID=f.id;applyFarmModel(String(f.id),f.model);renderList();toggleList(false);load(f.lat,f.lng,f.name);}
  });
  list.querySelectorAll(".rowmodel").forEach(sel=>{
    sel.onclick=(e)=>e.stopPropagation();                       // tapping the picker must not open the farm
    sel.onchange=(e)=>{
      e.stopPropagation();
      const id=sel.dataset.id, v=sel.value;
      if(v) FARM_MODELS[id]=v; else delete FARM_MODELS[id];
      saveFarmModels(); updateModelNote();
      // if this is the farm currently on screen, switch and re-fetch immediately
      if(String(ACTIVE_ID)===id && v && v!==MODEL && MODELS.some(x=>x.api===v)){
        MODEL=v; try{localStorage.setItem("skewt.model.v1",MODEL);}catch(err){}
        populateModelSel();
        if(LATLON) load(LATLON[0],LATLON[1],LASTLABEL);
      }
    };
  });
}

/* ---------- recycle bin (inside sheet) ---------- */
function deletedFarms(){return allFarms().filter(f=>f.deleted);}
function renderBin(){
  const bin=deletedFarms();
  document.getElementById("binCount").textContent=bin.length;
  const wrap=document.getElementById("binList");
  if(!bin.length){
    wrap.innerHTML=`<div style="padding:14px 2px;color:var(--faint);font-size:13px">${L("回收站是空的。","Bin is empty.")}</div>`;
    const rs=document.getElementById("restoreSeeds"); if(rs)rs.classList.toggle("hidden",loadPurged().length===0);
    return;
  }
  wrap.innerHTML=bin.map(f=>{
    const restore=`<button class="rbtn" data-act="restore" data-id="${f.id}">${L("恢复","Restore")}</button>`;
    const purge=`<button class="rbtn purge" data-act="purge" data-id="${f.id}">${L("清除","Purge")}</button>`;
    return `<div class="frow del"><div class="fn">${esc(f.name)}<small>${f.region||""}</small></div>${restore}${purge}</div>`;
  }).join("");
  wrap.querySelectorAll("button").forEach(b=>b.onclick=()=>farmAction(b.dataset.act,b.dataset.id));
  const rs=document.getElementById("restoreSeeds");
  if(rs)rs.classList.toggle("hidden",loadPurged().length===0);
}

function farmAction(act,id){
  const del=loadDeleted();
  if(act==="hide"||act==="soft"){
    if(id[0]==="s"){ if(!del.includes(id)){del.push(id);saveDeleted(del);} }
    else{ const u=loadUserFarms();const t=u.find(f=>f.id===id);if(t)t.deleted=true;saveUserFarms(u); }
  }
  if(act==="restore"){
    if(id[0]==="s"){ saveDeleted(del.filter(x=>x!==id)); }
    else{ const u=loadUserFarms();const t=u.find(f=>f.id===id);if(t)t.deleted=false;saveUserFarms(u); }
  }
  if(act==="purge"){
    if(confirm("Permanently remove this farm from your list?")){
      if(id[0]==="s"){
        const p=loadPurged(); if(!p.includes(id)){p.push(id);savePurged(p);}
        saveDeleted(del.filter(x=>x!==id)); // tidy up
      }else{
        saveUserFarms(loadUserFarms().filter(f=>f.id!==id));
      }
      if(ACTIVE_ID===id)ACTIVE_ID=null;
    }
  }
  renderList(); renderBin();
}
function addFarm(){
  const name=document.getElementById("mName").value.trim();
  const lat=parseFloat(document.getElementById("mLat").value);
  const lng=parseFloat(document.getElementById("mLng").value);
  const reg=document.getElementById("mReg").value.trim()||"My farms 我的果园";
  const gs=document.getElementById("gpsStatus");
  if(!name){gs.textContent="Give the farm a name first.";return;}
  if(!isFinite(lat)||lat<-90||lat>90||!isFinite(lng)||lng<-180||lng>180){gs.textContent="Enter a valid Lat (-90..90) and Lng (-180..180).";return;}
  const u=loadUserFarms();
  const mdl=document.getElementById("mModel")?document.getElementById("mModel").value:"";
  u.push({id:"u"+Date.now(),name,lat,lng,region:reg,deleted:false,...(mdl?{model:mdl}:{})});
  saveUserFarms(u);
  ["mName","mLat","mLng","mReg","mModel"].forEach(i=>{const el=document.getElementById(i); if(el)el.value="";});
  gs.textContent="";
  OPEN_REGIONS.add(reg);
  const f=u[u.length-1]; ACTIVE_ID=f.id;
  renderList(); renderBin();
  closeSheet();
  load(f.lat,f.lng,f.name);
}

function closeSheet(){document.getElementById("overlay").classList.add("hidden");}
function showAddView(){document.getElementById("viewAdd").classList.remove("hidden");document.getElementById("viewBin").classList.add("hidden");}
function showBinView(){document.getElementById("viewBin").classList.remove("hidden");document.getElementById("viewAdd").classList.add("hidden");renderBin();}

/* ---------- app flow ---------- */
let DATA=null, LATLON=null, LASTLABEL=null;
function fmtHour(iso){const d=new Date(iso);return d.toLocaleTimeString(LOCALE(),{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtFull(iso){const d=new Date(iso);return d.toLocaleString(LOCALE(),{weekday:'short',hour:'2-digit',minute:'2-digit',hour12:false});}

let HR_START=0, HR_END=0, CUR_I=0;
function buildHourStrip(){
  const h=DATA.hourly, now=Date.now();
  let start=h.time.findIndex(t=>new Date(t).getTime()>=now-3600000);
  if(start<0)start=0;
  HR_START=start; HR_END=Math.min(start+23, h.time.length-1);
  const strip=document.getElementById("hours"); strip.innerHTML="";
  for(let i=start;i<start+24 && i<h.time.length;i++){
    const div=document.createElement("div");
    div.className="hr"+(i===start?" on":"");
    div.dataset.i=i;
    div.innerHTML=`<div>${fmtHour(h.time[i])}</div><div class="t">${Math.round(h.temperature_2m[i])}°</div><div class="r">${(h.precipitation[i]||0).toFixed(1)}mm</div>`;
    div.onclick=()=>showHour(i);
    strip.appendChild(div);
  }
  // 24-hour storm-risk strip: one segment per hour tile, same window
  const rs=document.getElementById("riskstrip");
  let dayMaxWs=0, dayMaxHt=0;
  if(rs){ rs.innerHTML="";
    for(let i=start;i<start+24 && i<h.time.length;i++){
      let lvl=0;
      try{ const P=buildProfile(DATA,i); const A=analyze(P); lvl=stormScores(P,A).level;
        (A.profWind||[]).forEach(w=>{ if(w.ws!=null&&w.ws>dayMaxWs)dayMaxWs=w.ws; if(w.ht!=null&&w.ht>dayMaxHt)dayMaxHt=w.ht; });
      }catch(e){}
      const seg=document.createElement("div");
      seg.className="rs r"+lvl; seg.dataset.i=i; seg.title=fmtHour(h.time[i]);
      seg.onclick=()=>showHour(i);
      rs.appendChild(seg);
    }
  }
  // rain-probability strip (ensemble-based; hidden with a shrug when the model lacks it)
  (function(){
    const pr=document.getElementById("poprow"); if(!pr)return;
    const arr=DATA.hourly.precipitation_probability;
    const has=arr&&arr.slice(HR_START,HR_END+1).some(v=>v!=null);
    pr.classList.toggle("hidden",!has);
    if(!has){pr.innerHTML="";return;}
    pr.innerHTML=`<span class="pcap">${L("概率%","prob%")}</span>`;
    for(let i=HR_START;i<=HR_END;i++){
      const v=arr[i]==null?0:arr[i];
      const b=document.createElement("div");
      b.className="pb"+(i===CUR_I?" on":"");
      b.style.height=Math.max(6,Math.round(v/100*34))+"px";
      b.title=Math.round(v)+"%";
      b.dataset.i=i;
      b.onclick=()=>showHour(i);
      pr.appendChild(b);
    }
  })();
  // one stable wind axis for the whole day: max over 24h, +8% headroom, nice 20s, floor 60
  WIND_SCALE_MAX = dayMaxWs>0 ? Math.max(60, Math.ceil(dayMaxWs*1.08/20)*20) : null;
  HT_SCALE_MAX  = dayMaxHt>0 ? Math.max(4, Math.ceil((dayMaxHt/1000)/2)*2) : null;
  // configure fullscreen + wind-section slider bounds
  const sl=document.getElementById("fsSlider");
  if(sl){ sl.min=HR_START; sl.max=HR_END; sl.value=start; }
  const wsl=document.getElementById("windSlider");
  if(wsl){ wsl.min=HR_START; wsl.max=HR_END; wsl.value=start; }
  showHour(start);
}
function showHour(i){
  CUR_I=i;
  const P=buildProfile(DATA,i);
  const A=analyze(P);
  LAST_P=P; LAST_A=A;
  draw(P,A);
  const fsOpen=!document.getElementById("chartFs").classList.contains("hidden");
  if(fsOpen) draw(P,A,document.getElementById("chartBig"));
  render(P,A,fmtFull(DATA.hourly.time[i]));
  // keep tile strip highlight in sync
  document.querySelectorAll(".hr").forEach(e=>e.classList.toggle("on", +e.dataset.i===i));
  document.querySelectorAll(".rs").forEach(e=>e.classList.toggle("on", +e.dataset.i===i));
  const on=document.querySelector(".hr.on"), strip=document.getElementById("hours");
  if(on&&strip){ // horizontal-only centering, never scrolls the page vertically
    const target=on.offsetLeft-(strip.clientWidth-on.clientWidth)/2;
    strip.scrollTo({left:Math.max(0,target),behavior:"smooth"});
  }
  // keep fullscreen + wind-section sliders + labels in sync
  const h=DATA.hourly;
  const labHtml=`<b>${fmtFull(h.time[i])}</b> · ${Math.round(h.temperature_2m[i])}° · ${(h.precipitation[i]||0).toFixed(1)} mm`;
  const sl=document.getElementById("fsSlider"); if(sl&&+sl.value!==i) sl.value=i;
  const lb=document.getElementById("fsSliderLabel"); if(lb) lb.innerHTML=labHtml;
  const wsl=document.getElementById("windSlider"); if(wsl&&+wsl.value!==i) wsl.value=i;
  drawTimeHeight();
  const wlb=document.getElementById("windSliderLabel"); if(wlb) wlb.innerHTML=labHtml;
  updateThCursor(i);   // time-height panel cursor follows the hour
  renderParcelMatrix(LAST_A);
  updateEnsHour(i);
  document.querySelectorAll("#poprow .pb").forEach(b=>b.classList.toggle("on",+b.dataset.i===i));
}
