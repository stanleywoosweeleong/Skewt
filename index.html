async function load(lat,lon,label){
  const st=document.getElementById("status");
  try{
    st.textContent=L("正在获取大气探空…","Pulling atmospheric sounding…");
    DATA=await getSounding(lat,lon); LATLON=[lat,lon]; LASTLABEL=label||null;
    SONDE=null; SONDE_ON=false; updateSondeUI();   // sonde overlay is per-location: reset on change
    renderLocCaption();
    ["loc","hours","hoursLabel","riskstrip","verdict","crossTip","parcelRow","chartwrap","legendWrap","cards","ingredients","pmatrix","enswrap","hodowrap","thwrap","explain"].forEach(id=>document.getElementById(id).classList.remove("hidden"));
    document.getElementById("err").classList.add("hidden");
    document.getElementById("reloadBtn").classList.remove("hidden");
    document.getElementById("shareBtn").classList.remove("hidden");
    try{localStorage.setItem("skewt.lastLoc.v1",JSON.stringify({lat,lon,label:LASTLABEL,activeId:(typeof ACTIVE_ID!=="undefined"?ACTIVE_ID:null)}));}catch(e){}
    st.textContent="";
    buildHourStrip();
    if(SONDE_WORKER && sondePrefOn()) toggleSonde();   // observed sounding overlays by default (user's hide choice is remembered)
    fetchEnsemble();   // ensemble fan refreshes per location/model (async, never blocks the chart)
    if(COMPARE_MODEL) refreshCompare();                // second-model overlay follows the location
    // bring the chart into view consistently: only if the user is scrolled down,
    // and jump instantly rather than a long smooth animation that feels like a lurch.
    requestAnimationFrame(()=>{ if(window.scrollY>4) window.scrollTo({top:0,behavior:"auto"}); });
  }catch(e){
    document.getElementById("err").textContent="Couldn't load weather data: "+e.message+". Check your connection and try again.";
    document.getElementById("err").classList.remove("hidden");
    st.textContent=L("出错了，请重试。","Something went wrong.");
  }
}

  ACTIVE_ID=null; renderList();

document.getElementById("shareBtn").onclick=()=>{
  if(!LAST_P||!LAST_A||!DATA)return;
  const P=LAST_P, A=LAST_A, h=DATA.hourly;
  const label=(LASTLABEL==="@myloc")?L("当前位置","Current location"):(LASTLABEL||L("探空","Sounding"));
  const tz=DATA.timezone_abbreviation||DATA.timezone||"";
  const v=stormVerdict(stormScores(P,A).branch)[0];
  const rain=P.precip||0;
  const num=(x,d=0)=>x!=null&&isFinite(x)?(+x).toFixed(d):"—";
  // shear is null when the model lacks upper-air winds (e.g. IFS 9km) — say so, don't print a fake 0
  const shearTxt = A.shear==null
    ? L("高空风：不适用（地面模式）","winds aloft: n/a (surface model)")
    : L(`0–6km 切变 ${Math.round(A.shear)} km/h`,`0–6km shear ${Math.round(A.shear)} km/h`);
  // plain text only: emoji render as � on some receiving devices (WhatsApp Web/Windows),
  // and broadcasts get forwarded everywhere — reliability beats decoration
  const vPlain=v.replace(/^[^\p{L}\p{N}*]+/u,"");   // strip any leading emoji from the verdict
  const lines=L(
    [`*SkewT 探空*`,
     `${label}`,
     `${fmtFull(h.time[CUR_I])} · ${tz}`,
     ``,
     `*${vPlain}*`,
     ``,
     `降雨：${rainWordOf(rain)} · ${rain.toFixed(1)} mm/h`,
     `CAPE ${num(A.cape)} J/kg · CIN ${num(A.cin)} J/kg`,
     `可降水量 ${num(A.pw)} mm`,
     `${shearTxt} · 云量 ${num(P.cloud)}%`,
     ``,
     `模式：${modelShort()} · Open-Meteo`],
    [`*SkewT Sounding*`,
     `${label}`,
     `${fmtFull(h.time[CUR_I])} · ${tz}`,
     ``,
     `*${vPlain}*`,
     ``,
     `Rain: ${rainWordOf(rain)} · ${rain.toFixed(1)} mm/h`,
     `CAPE ${num(A.cape)} J/kg · CIN ${num(A.cin)} J/kg`,
     `PW ${num(A.pw)} mm`,
     `${shearTxt} · cloud ${num(P.cloud)}%`,
     ``,
     `Model: ${modelShort()} · Open-Meteo`]).join("\n");
  window.open("https://wa.me/?text="+encodeURIComponent(lines),"_blank");
};

function sizeFs(){
  const fs=document.getElementById("chartFs");

  const bar=fs.querySelector(".chartfs-bar"), tip=document.getElementById("crossTipBig"),
        body=fs.querySelector(".chartfs-body"), tb=fs.querySelector(".fs-timebar");
  // release previous constraint so measurements are natural
  [bar,tip,body,tb].forEach(e=>{if(e){e.style.width="";e.style.marginLeft="";e.style.marginRight="";}});
  if(window.innerWidth>=1000) return;   // desktop: the side-panel grid does the layout
  const others=(bar?bar.offsetHeight:0)+(tip?tip.offsetHeight:0)+(tb?tb.offsetHeight:0);
  const avail=Math.max(220, window.innerHeight-others-10);
  const w=Math.floor(Math.min(avail*(500/560), window.innerWidth*0.97));
  [bar,tip,body,tb].forEach(e=>{if(e){e.style.width=w+"px";e.style.marginLeft="auto";e.style.marginRight="auto";}});
}

/* ---- chart snapshot: render the SVG to a PNG with a caption footer, then share ---- */
let SNAP_BLOB=null, SNAP_KEY="";
function snapKey(){ return (LASTLABEL||"")+"|"+CUR_I+"|"+MODEL+"|"+PARCEL_SEL+"|"+(SONDE_ON?1:0)+"|"+COMPARE_MODEL; }
function inlineStyles(srcRoot,dstRoot){
  const srcAll=srcRoot.querySelectorAll("*"), dstAll=dstRoot.querySelectorAll("*");
  const props=["fill","stroke","stroke-width","stroke-dasharray","opacity","font-size","font-family","font-weight","letter-spacing"];
  for(let i=0;i<srcAll.length;i++){
    const cs=getComputedStyle(srcAll[i]); let st="";
    for(const pr of props){ const v=cs.getPropertyValue(pr); if(v&&v!=="none"||pr==="fill"||pr==="stroke") st+=pr+":"+v+";"; }
    dstAll[i].setAttribute("style",st);
  }
}
function buildSnapshot(cb){
  const svg=document.getElementById("chart"); if(!svg||!DATA){cb(null);return;}
  const clone=svg.cloneNode(true);
  inlineStyles(svg,clone);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const vb=svg.viewBox.baseVal, SC=2.2, W=Math.round(vb.width*SC), H=Math.round(vb.height*SC), FOOT=Math.round(56*SC/2.2);
  const ser=new XMLSerializer().serializeToString(clone);
  const img=new Image();
  img.onload=()=>{
    const cv=document.createElement("canvas"); cv.width=W; cv.height=H+FOOT;
    const cx=cv.getContext("2d");
    cx.fillStyle=getComputedStyle(document.body).backgroundColor||"#0a0e1a";
    cx.fillRect(0,0,cv.width,cv.height);
    cx.drawImage(img,0,0,W,H);
    // caption footer
    const label=(LASTLABEL==="@myloc")?L("当前位置","Current location"):(LASTLABEL||"");
    const t=DATA.hourly.time[CUR_I];
    cx.fillStyle="#e8ecf5"; cx.font=`700 ${Math.round(15*SC/1.6)}px -apple-system,system-ui,sans-serif`;
    cx.fillText(`${label} · ${fmtFull(t)} · ${modelShort()} (${parcelTag()})`, 18, H+FOOT*0.42);
    cx.fillStyle="#8b93a7"; cx.font=`600 ${Math.round(11*SC/1.6)}px -apple-system,system-ui,sans-serif`;
    cx.fillText("SkewT Sounding · stanleywoosweeleong.github.io/SkewT", 18, H+FOOT*0.78);
    cv.toBlob(b=>cb(b),"image/png");
  };
  img.onerror=()=>cb(null);
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(ser);
}
async function shareSnapshot(blob){
  const file=new File([blob],"skewt-sounding.png",{type:"image/png"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file]}); return true; }
    catch(e){ if(e&&e.name==="AbortError")return true; return false; }
  }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="skewt-sounding.png"; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  return true;
}
document.getElementById("snapBtn").onclick=()=>{
  const b=document.getElementById("snapBtn");
  if(SNAP_BLOB&&SNAP_KEY===snapKey()){          // second tap (iOS gesture rule): share the cached image
    shareSnapshot(SNAP_BLOB).then(ok=>{ if(ok){b.textContent="📷";} });
    return;
  }
  b.textContent="⏳";
  buildSnapshot(blob=>{
    if(!blob){ b.textContent="📷"; alert(L("图片生成失败。","Could not build the image.")); return; }
    SNAP_BLOB=blob; SNAP_KEY=snapKey();
    shareSnapshot(blob).then(ok=>{
      if(ok){ b.textContent="📷"; }
      else { b.textContent="📤"; b.title=L("再点一次发送图片","Tap again to send the image"); }
    });
  });
};

/* offline shell */
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("sw.js").then(reg=>{
    // check for a newer service worker whenever the app regains focus
    const check=()=>{ try{ reg.update(); }catch(e){} };
    document.addEventListener("visibilitychange",()=>{ if(!document.hidden) check(); });
    setInterval(check, 60*60*1000);   // hourly while open
  }).catch(()=>{});
  // when a new service worker takes control, reload once to show the fresh version
  let _reloaded=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(_reloaded)return; _reloaded=true; location.reload();
  });
}
