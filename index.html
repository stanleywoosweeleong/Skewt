<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>SkewT Sounding · GPS Weather Analysis</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<link rel="icon" href="favicon.ico" sizes="any">
<style>
:root{
  --bg:#0a0e1a; --panel:#121828; --panel2:#1a2136; --line:#2a3350;
  --ink:#f2f5fb; --dim:#aeb8d0; --faint:#8791ad;
  --temp:#ff6b3d; --dew:#3dd68c; --parcel:#ffd23d; --wind:#7aa2ff;
  --dry:#c8734a; --moist:#3a8a6a; --mix:#6a5a8a; --iso:#3a4666;
  --frz:#5cc8ff; --wbz:#8ad4ff;
  --accent:#ff6b3d; --warn:#ffb03d; --danger:#ff4d6d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);max-width:760px;margin:0 auto;padding-bottom:40px}
header{padding:18px 16px 10px}
.brand{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.brand h1{font-size:19px;font-weight:800;letter-spacing:-0.02em}
.brand .sub{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:0.14em}
.info-btn{margin-left:4px;padding:0;width:32px;height:32px;font-size:20px;line-height:1;background:transparent;border:none;box-shadow:none;color:var(--dim);cursor:pointer}
.info-btn:active{transform:none;color:var(--accent)}
.lang-btn{flex:0 0 auto;margin-left:auto;padding:5px 12px;font-size:13px;font-weight:800;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--dim);letter-spacing:.04em}
.lang-btn:active{color:var(--accent);border-color:var(--accent)}
/* Chinese glyphs render smaller than Latin at equal px — lift dense text in zh mode */
body.lang-zh .status{font-size:13.5px}
body.lang-zh .listhead .lh-title{font-size:15px}
body.lang-zh .card .d{font-size:13.5px;line-height:1.55}
body.lang-zh .card .k{font-size:11px;letter-spacing:.04em}
body.lang-zh .ingq{font-size:13.5px}
body.lang-zh .ingreason{font-size:14.5px;line-height:1.65}
body.lang-zh .ingfoot{font-size:13.5px;line-height:1.7}
body.lang-zh .dbody{font-size:14.5px;line-height:1.85}
body.lang-zh .hodonote{font-size:14.5px;line-height:1.75}
body.lang-zh .verdict p{font-size:14px;line-height:1.65}
body.lang-zh .verdict .big{font-size:18px}
body.lang-zh details summary{font-size:15px}
body.lang-zh .sect,body.lang-zh .cardsect{font-size:13px;letter-spacing:.05em}
body.lang-zh .sheet .sd{font-size:13.5px;line-height:1.6}
body.lang-zh .chart-hint{font-size:13px}
body.lang-zh .fs-slabel{font-size:14px}
/* model selector row */
.modelrow{display:flex;align-items:center;gap:8px;margin:10px 16px 0}
.modelrow label{font-size:11px;color:var(--faint);font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.modelrow select{flex:1;max-width:280px;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-size:13px;font-weight:600;-webkit-appearance:none;appearance:none}
/* 24-hour storm risk strip */
.riskstrip{display:flex;gap:3px;margin:8px 16px 2px}
.rs{flex:1;height:13px;border-radius:4px;background:#1f2740;cursor:pointer;transition:transform .1s}
.rs.r1{background:#2f8f6e}
.rs.r2{background:var(--warn)}
.rs.r3{background:var(--danger)}
.rs.on{outline:2px solid var(--ink);outline-offset:1px}
.rs:active{transform:scaleY(1.3)}
.guide-link{display:block;width:calc(100% - 24px);margin:10px 12px 0;padding:12px;font-size:13px;font-weight:600;color:var(--accent);background:transparent;border:1px dashed var(--line);border-radius:12px}
.guide-overlay{position:fixed;inset:0;background:rgba(4,7,15,.72);z-index:70;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.guide-sheet{width:100%;max-width:760px;background:var(--bg);border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideup .22s ease}
.guide-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;border-bottom:1px solid var(--line)}
.guide-bar span{font-size:16px;font-weight:800}
.guide-x{flex:0 0 auto;width:36px;height:36px;padding:0;border-radius:50%;font-size:15px;color:var(--dim)}
.guide-qr{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 12px;margin:6px 0 4px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
.guide-qr svg{width:150px;height:150px;background:#fff;border-radius:10px;padding:8px;box-sizing:border-box}
.guide-qr .qrcap{font-size:12px;color:var(--dim);text-align:center;line-height:1.5}
.guide-qr .qrurl{font-size:11px;color:var(--faint);word-break:break-all}
.guide-credit{font-size:11px;color:var(--faint);line-height:1.6;text-align:left;padding:18px 12px 4px;border-top:1px solid var(--line);margin-top:8px}
.guide-scroll{overflow-y:auto;padding:6px 6px calc(20px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.tagline{font-size:12px;color:var(--dim);margin-top:3px}
.bar{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;align-items:center}
button{font-family:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--panel2);color:var(--ink);padding:9px 14px;border-radius:10px;cursor:pointer;transition:.15s}
button:active{transform:scale(.97)}
button.primary{background:var(--accent);border-color:var(--accent);color:#1a0f08}
button:disabled{opacity:.5}
input{font-family:inherit;font-size:14px;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:11px 12px;border-radius:10px;min-width:0;width:100%}
input:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent)}
.toolbar{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;align-items:center}
.tb-group{display:inline-flex;gap:8px;align-items:center}
.toolbar-share{padding-top:0}
.wabtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-weight:800;font-size:15px;color:#eafff0;border:1px solid rgba(37,211,102,.55);background:rgba(37,211,102,.16);border-radius:12px;padding:12px 18px}
.wabtn::before{content:"";width:18px;height:18px;flex:0 0 auto;background:#25d366;-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.4A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.5 6.5 0 01-1.9-1.2 7.2 7.2 0 01-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 00-.7.3A2.9 2.9 0 007 8.6a5 5 0 001.1 2.7 11.4 11.4 0 004.3 3.8c.6.3 1.1.4 1.5.5a3.5 3.5 0 001.6.1 2.7 2.7 0 001.8-1.3 2.2 2.2 0 00.2-1.3c-.1-.1-.3-.2-.5-.3z'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.4A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.5 6.5 0 01-1.9-1.2 7.2 7.2 0 01-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 00-.7.3A2.9 2.9 0 007 8.6a5 5 0 001.1 2.7 11.4 11.4 0 004.3 3.8c.6.3 1.1.4 1.5.5a3.5 3.5 0 001.6.1 2.7 2.7 0 001.8-1.3 2.2 2.2 0 00.2-1.3c-.1-.1-.3-.2-.5-.3z'/></svg>") center/contain no-repeat}
.wabtn:active{background:rgba(37,211,102,.26)}
button.compact{padding:9px 12px;font-size:15px;line-height:1}
.pickwrap{padding:4px 16px 6px}
.listhead{width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;text-align:left;cursor:pointer}
.listhead .lh-caret{color:var(--accent);font-size:13px;width:12px;flex:0 0 auto}
.listhead .lh-title{flex:1;font-weight:700;font-size:14px;color:var(--ink)}
.listhead .lh-count{font-size:12px;color:var(--faint);font-weight:600}
.listhead.open{border-radius:12px 12px 0 0;border-bottom:none}
.listbody{border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:10px}
.loc-filter{margin-bottom:10px}
.loc-list{max-height:52vh;overflow-y:auto;border:1px solid var(--line);border-radius:12px;background:var(--bg)}
/* region accordion */
.rgroup{border-bottom:1px solid var(--line)}
.rgroup:last-child{border-bottom:none}
.ghead{width:100%;display:flex;align-items:center;gap:9px;padding:13px 14px;background:transparent;border:none;border-radius:0;text-align:left;cursor:pointer}
.ghead:active{transform:none}
.ghead .gcar{color:var(--accent);font-size:12px;width:12px;flex:0 0 auto}
.ghead .gname{flex:1;font-weight:700;font-size:14px;color:var(--ink)}
.ghead.open .gname{color:var(--accent)}
.ghead .gcount{font-size:12px;color:var(--faint);font-weight:600}
.ghead.open{background:var(--panel2)}
.gbody{padding:2px 0}
/* farm row = tappable card */
.frow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--line);font-size:13px;cursor:pointer}
.frow:active{background:var(--panel2)}
.frow.active{background:rgba(255,107,61,.14);box-shadow:inset 3px 0 0 var(--accent)}
.frow.active .fn{color:var(--accent);font-weight:700}
.frow .fn{flex:1;min-width:0;line-height:1.35}
.frow .fn small{color:var(--faint);display:block;font-size:11px;margin-top:1px}
.frow.del .fn{opacity:.45;text-decoration:line-through}
.frow .tag{font-size:9px;background:var(--panel2);color:var(--faint);padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
.gdel{color:var(--warn);font-weight:700;margin-left:6px}
/* bottom sheet */
.overlay{position:fixed;inset:0;background:rgba(4,7,15,.66);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
.sheet{width:100%;max-width:760px;background:var(--panel);border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;padding:22px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;position:relative;animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.xbtn{position:absolute;top:14px;right:14px;width:34px;height:34px;padding:0;border-radius:50%;font-size:15px;color:var(--dim)}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:4px}
.sheet .sd{font-size:12.5px;color:var(--dim);margin-bottom:16px;line-height:1.5}
.sheet label{display:block;font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 5px}
.cpair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gps-btn{width:100%;margin-top:12px;padding:12px;background:var(--panel2)}
.gps-status{font-size:12px;color:var(--dim);margin-top:8px;min-height:16px}
.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.s-cancel{padding:13px}
.s-save{padding:13px;background:var(--accent);border-color:var(--accent);color:#1a0f08;font-weight:800}
.bin-entry{width:100%;margin-top:16px;padding:12px;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:8px}
.bin-count{background:var(--panel2);color:var(--dim);font-size:11px;padding:1px 8px;border-radius:10px}
.bin-back{margin-bottom:12px;padding:9px 12px;font-size:12px}
.bin-back+h2{margin-top:2px}
#binList .frow,#binList{border-color:var(--line)}
#binList .frow{cursor:default}
.frow .rbtn{padding:6px 11px;font-size:11px;border-radius:8px;flex:0 0 auto}
.frow .rbtn.purge{border-color:var(--danger);color:var(--danger)}
.restore-seeds{width:100%;margin-top:14px;padding:11px;font-size:12.5px;color:var(--dim)}
.status{font-size:12px;color:var(--dim);padding:2px 16px 6px}
.loc{padding:2px 16px 12px;text-align:center;line-height:1.4}
.loc .locname{display:block;font-size:16px;font-weight:800;color:var(--ink)}
.loc .locmeta{display:block;margin-top:2px;font-size:11.5px;color:var(--faint);font-weight:600}
.hours{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;scrollbar-width:none}
.hours::-webkit-scrollbar{display:none}
.hr{flex:0 0 auto;min-width:56px;text-align:center;padding:8px 6px;border-radius:10px;background:var(--panel);border:1px solid var(--line);cursor:pointer;font-size:11px;line-height:1.4}
.hr.on{background:var(--accent);border-color:var(--accent);color:#1a0f08}
.hr .t{font-weight:800;font-size:14px}
.hr .r{font-size:10px;opacity:.85}
.chartwrap{padding:6px 10px;position:relative}
.crosstip{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(18,24,40,.95);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--ink);line-height:1.5;pointer-events:none;opacity:1;transition:opacity .12s;backdrop-filter:blur(3px);white-space:nowrap;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.crosstip-fs{position:static;transform:none;margin:2px 16px 8px;left:auto;top:auto;white-space:normal;box-shadow:none;background:var(--panel2)}
.crosstip-inline{position:static;transform:none;margin:4px 12px 6px;left:auto;top:auto;white-space:normal;box-shadow:none;background:var(--panel2)}
.crosstip b{font-size:13px}
.crosstip .ttrow{display:flex;align-items:center;gap:5px;margin-top:3px;color:var(--dim)}
.crosstip .ttrow i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-left:2px}
.crosstip .ttrow i:first-child{margin-left:0}
.chart-hint{text-align:center;font-size:12px;color:var(--faint);margin-top:2px}
@media(hover:hover){.chart-hint::before{content:"🖱 "}}
.snap-btn{right:64px !important}
.expand-btn{position:absolute;top:10px;right:14px;width:34px;height:34px;padding:0;font-size:16px;border-radius:9px;background:rgba(18,24,40,.9);color:var(--dim);z-index:6}
/* ---------- desktop layout (wide screens) ---------- */
@media (min-width: 900px){
  /* hodograph + wind profile side by side, slider and explainer spanning both */
  #hodowrap{display:grid;grid-template-columns:1fr 1fr;column-gap:28px;row-gap:2px;align-items:start}
  #hodoTitle{grid-column:1;grid-row:1}
  #wpTitle{grid-column:2;grid-row:1;margin-top:0}
  #hodowrap #hodo{grid-column:1;grid-row:2;max-width:400px;justify-self:center}
  #hodowrap #windprof{grid-column:2;grid-row:2;max-width:400px;justify-self:center}
  #hodowrap .windslider-row{grid-column:1/-1;grid-row:3;max-width:640px;justify-self:center;width:100%}
  #hodowrap .notebox{grid-column:1/-1;grid-row:4}
}
/* fullscreen chart overlay */
.chartfs{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.chartfs-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px}
.chartfs-bar #fsTitle{font-size:15px;font-weight:800;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:12px}
.fs-close{width:38px;height:38px;padding:0;font-size:16px;font-weight:700;border-radius:50%;flex:0 0 auto;color:var(--dim)}
.chartfs-body{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 8px}
.chartfs-body svg{width:100%;height:100%;max-width:100%;display:block}
.fs-timebar{padding:8px 16px calc(10px + env(safe-area-inset-bottom))}
.fs-timebar .chart-hint{text-align:left;margin-top:8px;line-height:1.5}
.fs-parcelwrap{text-align:center;margin-bottom:10px}
.fs-parcelwrap .seg{display:inline-flex}
.fs-slabel{text-align:center;font-size:13px;color:var(--dim);margin-bottom:8px}
.fs-slabel b{color:var(--ink);font-weight:800}
/* desktop enlarged view: chart fills the height on the left, readout + slider dock right.
   Placed after the base rules so it reliably overrides display:flex. */
@media (min-width: 1000px){
  .chartfs{
    display:grid;
    grid-template-columns:minmax(0,1fr) 340px;
    grid-template-rows:auto 1fr;
    column-gap:20px;
    align-items:stretch;
  }
  .chartfs-bar{grid-column:1 / -1; grid-row:1;}
  .chartfs-body{grid-column:1; grid-row:2; padding:0 0 16px 16px;}
  .chartfs-body svg{width:auto;height:100%;max-height:100%;margin:0 auto;}
  #crossTipBig{
    grid-column:2; grid-row:2;
    align-self:start; margin:0 16px 0 0;
    max-width:100%;
  }
  .fs-timebar{
    grid-column:2; grid-row:2;
    align-self:end; margin:0 16px 0 0; padding-bottom:24px;
  }
}
.fs-slrow{display:flex;align-items:center;gap:12px}
#fsSlider,#windSlider{flex:1;width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:var(--panel2);outline:none}
#fsSlider::-webkit-slider-thumb,#windSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,.4)}
#fsSlider::-moz-range-thumb,#windSlider::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg)}
svg{width:100%;height:auto;display:block;touch-action:manipulation}
#chart,#chartBig{-webkit-user-select:none;user-select:none;-webkit-user-drag:none;-webkit-touch-callout:none}
#chart *,#chartBig *{-webkit-user-drag:none;user-drag:none}
.legend-head{width:auto;display:inline-flex;align-items:center;gap:7px;margin:2px 16px 0;padding:5px 10px;font-size:11px;font-weight:700;color:var(--dim);background:transparent;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.legend-head .lg-caret{color:var(--accent);font-size:10px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 16px 12px;font-size:11px;color:var(--dim)}
.legendwrap.collapsed .legend{display:none}
.legend span{display:inline-flex;align-items:center;gap:5px}
.sw{width:16px;height:3px;border-radius:2px;display:inline-block}
.cards{padding:6px 12px}
.cardsect{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);padding:14px 4px 8px}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
.card .k{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
#hodowrap{padding:6px 16px 4px}
#hodowrap svg{margin-bottom:0}
#hodowrap #wpTitle{margin-top:4px}
#hodowrap .windslider-row{margin-top:2px}
#hodowrap svg{max-width:340px;margin:0 auto;display:block}
.parcelrow{display:flex;align-items:center;gap:6px 10px;margin:2px 16px 6px;flex-wrap:wrap}
.parcel-lbl{flex:0 0 100%;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{padding:7px 12px;font-size:12px;font-weight:700;background:transparent;border:none;border-right:1px solid var(--line);color:var(--dim);border-radius:0}
.seg button:last-child{border-right:none}
.seg button.on{color:var(--accent);background:rgba(255,122,60,.12)}
.poprow{display:flex;align-items:flex-end;gap:2px;height:34px;margin:2px 16px 4px;padding:0 2px}
.poprow .pb{flex:1;min-width:0;background:rgba(93,156,255,.55);border-radius:2px 2px 0 0;position:relative}
.poprow .pb.on{background:var(--accent)}
.poprow .pcap{flex:0 0 auto;font-size:9.5px;color:var(--faint);font-weight:700;writing-mode:initial;align-self:center;margin-right:4px}
#enswrap{margin:4px 16px 8px}
#enswrap svg{width:100%;display:block}
.ens-cap{font-size:11.5px;color:var(--faint);margin:2px 2px 6px;line-height:1.5}
.ens-cap b{color:var(--dim)}
.ens-conf{display:inline-block;padding:1px 8px;border-radius:999px;font-weight:800;font-size:10.5px;margin-left:6px}
.ens-conf.hi{color:#3ddc8c;border:1px solid rgba(61,220,140,.5)}
.ens-conf.md{color:var(--warn);border:1px solid rgba(255,190,80,.5)}
.ens-conf.lo{color:var(--danger);border:1px solid rgba(255,90,90,.5)}
.ens-tiers{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.ens-tiers span{font-size:11.5px;font-weight:700;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:3px 10px}
.ens-tiers span b{color:var(--ink)}
#pmatrix{margin:10px 16px;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:var(--panel)}
#pmatrix .pm-title{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:4px}
#pmatrix .pm-sub{font-size:11.5px;color:var(--faint);margin-bottom:8px}
#pmatrix .pm-row{display:flex;gap:10px;align-items:flex-start;padding:7px 8px;border-radius:10px;opacity:.5}
#pmatrix .pm-row.on{opacity:1;background:rgba(255,122,60,.10);outline:1px solid rgba(255,122,60,.4)}
#pmatrix .pm-ic{flex:0 0 auto;font-size:15px;line-height:1.3}
#pmatrix .pm-t{font-size:12.5px;font-weight:800;color:var(--ink)}
#pmatrix .pm-d{font-size:11.5px;color:var(--dim);line-height:1.45}
body.lang-zh #pmatrix .pm-t{font-size:13.5px}
body.lang-zh #pmatrix .pm-d{font-size:12.5px;line-height:1.55}
.windslider-row{display:flex;flex-direction:column;gap:4px;padding:2px 6px 10px}
.hodonote{font-size:13.5px;color:var(--dim);line-height:1.55;max-width:520px;margin:0;text-align:left;padding:0 14px 12px}
.notebox{margin:6px 16px 4px}
.crosstip .ttinterp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:5px;padding-top:5px;border-top:1px dashed var(--line);font-size:11.5px;color:var(--dim);line-height:1.45;min-height:calc(2 * 1.45em + 5px)}
body.lang-zh .crosstip .ttinterp{font-size:12.5px}
.frow .rowmodel{flex:0 0 auto;max-width:96px;margin-left:8px;padding:4px 6px;font-size:11px;font-weight:700;color:var(--accent);background:transparent;border:1px solid var(--line);border-radius:8px;-webkit-appearance:none;appearance:none}
.sonderow{display:flex;align-items:center;gap:10px;margin:8px 16px 0}
.sonderow button{flex:0 0 auto;padding:6px 12px;font-size:12.5px;font-weight:700;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--dim)}
.sonderow button.on{color:var(--accent);border-color:var(--accent)}
.sondeinfo{font-size:11.5px;color:var(--faint);line-height:1.4;min-height:1em}
.sondeinfo.warn{color:var(--warn)}
.mnote{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.modelrow{flex-wrap:wrap}
.sheet select#mModel{width:100%;background:var(--bg2,#0f1526);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;margin-bottom:4px;-webkit-appearance:none;appearance:none}
.mtag{display:inline-block;margin-left:6px;padding:1px 7px;font-size:9.5px;font-weight:800;letter-spacing:.03em;color:var(--accent);border:1px solid var(--accent);border-radius:999px;vertical-align:2px;opacity:.85}
.notebox>summary{color:var(--dim);font-weight:600}
#ingredients{padding:6px 12px}
.ingpanel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 14px 14px}
.ingverdict{font-size:14px;font-weight:700;line-height:1.45;padding:12px;margin:8px 0 10px;border:1px solid var(--line);border-left-width:4px;border-radius:10px;background:var(--panel2)}
.ingrow{display:flex;gap:12px;padding:11px 2px;border-top:1px solid var(--line)}
.ingic{font-size:22px;flex:0 0 auto;width:28px;text-align:center}
.ingbody{flex:1;min-width:0}
.ingname{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.ingq{font-size:12.5px;color:var(--faint);margin:1px 0 4px}
.ingreason{font-size:13.5px;color:var(--dim);line-height:1.5}
.idot{font-size:13px}
.idot.yes{color:var(--danger)}
.idot.maybe{color:var(--warn)}
.idot.no{color:var(--faint)}
.ingfoot{font-size:12.5px;color:var(--faint);line-height:1.5;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
.ingfoot b{color:var(--dim)}
.card .v{font-size:19px;font-weight:800;margin-top:3px}
.card .d{font-size:12.5px;color:var(--dim);margin-top:3px;line-height:1.45}
.card .v .u{font-size:12px;color:var(--dim);font-weight:600}
.verdict{margin:8px 12px;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--panel)}
.verdict .h{font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:800;color:var(--faint)}
.verdict .big{font-size:17px;font-weight:800;margin:5px 0 6px}
.verdict p{font-size:13px;color:var(--dim);line-height:1.5}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;vertical-align:middle}
.sect{padding:12px 16px 2px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
details{margin:6px 12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
summary{padding:12px 14px;font-size:13px;font-weight:700;cursor:pointer;list-style:none}
summary::-webkit-details-marker{display:none}
summary::after{content:"+";float:right;color:var(--dim);font-weight:800}
details[open] summary::after{content:"–"}
.dbody{padding:0 14px 14px;font-size:13.5px;color:var(--dim);line-height:1.65}
.dbody b{color:var(--ink)}
.err{margin:12px;padding:12px 14px;border-radius:10px;background:#2a1320;border:1px solid var(--danger);color:#ffb0c0;font-size:13px;line-height:1.5}
.tick{font-size:10.5px;fill:var(--faint)}
.axl{font-size:10px;fill:var(--dim);font-weight:600}
.axl-zh{font-size:13px;fill:var(--dim);font-weight:700}
.gl-lbl{font-size:8.5px;font-weight:700}
footer{text-align:center;font-size:11px;color:var(--faint);padding:20px 16px 8px;line-height:1.6}
.hidden{display:none}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>SkewT Sounding</h1><span class="sub">Log-P</span><button class="lang-btn" id="langBtn">中文</button><button class="info-btn" id="infoBtn" title="Guide" aria-label="Guide">ⓘ</button></div>
  <div class="tagline" id="tagline">大气垂直廓线与降雨分析</div>
</header>

<div class="toolbar">
  <button id="locBtn" class="primary">📍 My location</button>

  <div class="listbody hidden" id="listBody">
    <input id="locFilter" class="loc-filter" placeholder="Filter farms 搜索果园…" autocomplete="off" aria-label="Filter farms 搜索果园"/>

</div>

<div class="status" id="status"></div>

<!-- bottom sheet: add / recycle bin -->

    <div id="viewAdd">

      <label id="lblName" for="mName"></label>

      <label id="lblCoord" for="mLat"></label>
      <div class="cpair">
        <input id="mLat" placeholder="Lat 3.2478" inputmode="decimal" autocomplete="off" aria-label="Latitude 纬度"/>
        <input id="mLng" placeholder="Lng 102.4189" inputmode="decimal" autocomplete="off" aria-label="Longitude 经度"/>
      </div>
      <label id="lblRegion" for="mReg"></label>
      <input id="mReg" placeholder="My farms 我的果园" autocomplete="off"/>
      <label id="lblModel2" for="mModel"></label>
      <select id="mModel"></select>
      <button class="gps-btn" id="mUseGps"></button>
      <div class="gps-status" id="gpsStatus"></div>
      <div class="sheet-actions">
        <button class="s-cancel" id="mCancel"></button>
        <button class="s-save" id="mAdd"></button>

      <button class="bin-back" id="binBack"></button>

<script>
"use strict";
/* ================= i18n core: Chinese default, one-tap toggle ================= */
let LANG = (function(){ try{ return localStorage.getItem("skewt.lang.v1")||"zh"; }catch(e){ return "zh"; } })();
const L=(zh,en)=>LANG==="zh"?zh:en;
const LOCALE=()=>LANG==="zh"?"zh-CN":"en-GB";
function setLang(l){
  LANG=l; try{localStorage.setItem("skewt.lang.v1",l);}catch(e){}
  applyStaticLang();
  renderList(); renderBin();
  if(typeof DATA!=="undefined" && DATA){ showHour(CUR_I); renderLocCaption(); }
}
function toggleLang(){ setLang(LANG==="zh"?"en":"zh"); }
function renderLocCaption(){
  if(!LATLON)return;
  const tz=(DATA&&(DATA.timezone_abbreviation||DATA.timezone))||"";
  const label=(LASTLABEL==="@myloc")?L("当前位置","Current location"):(LASTLABEL||L("探空","Sounding"));
  document.getElementById("loc").innerHTML=`<span class="locname">${label}</span><span class="locmeta">${LATLON[0].toFixed(3)}, ${LATLON[1].toFixed(3)} · ${L("时区","Times in")} ${tz} · ${modelShort()}</span>`;
}
/* ================= weather model selection (same six as RainScore Lab) ================= */
const MODELS=[
  { api:"ecmwf_ifs025",       short:"IFS",      zh:"欧洲 ECMWF 0.25°", en:"ECMWF 0.25° (Europe)" },
  { api:"ecmwf_ifs",          short:"IFS 9km",  zh:"欧洲 ECMWF 9km", en:"ECMWF 9km (Europe)", surfaceOnly:true },
  { api:"ecmwf_aifs025_single", short:"AIFS",   zh:"欧洲 ECMWF · AI",  en:"ECMWF AIFS (AI)" },
  { api:"gfs_graphcast025",   short:"GraphCast", zh:"GraphCast · AI",  en:"GraphCast (AI · NOAA)" },
  { api:"icon_seamless",      short:"ICON", zh:"德国 DWD",     en:"DWD (Germany)"  },
  { api:"jma_gsm",            short:"JMA",  zh:"日本气象厅",   en:"JMA (Japan)"    },
  { api:"cma_grapes_global",  short:"CMA",  zh:"中国气象局",   en:"CMA (China)"    },
  { api:"gem_global",         short:"GEM",  zh:"加拿大",       en:"GEM (Canada)"   },
  { api:"gfs_seamless",       short:"GFS",  zh:"美国 NOAA",    en:"GFS (US NOAA)"  },
];
/* ================= radiosonde overlay (observed balloon vs forecast) =================
   SONDE_WORKER: paste your deployed Cloudflare Worker URL here (see sonde-worker.js).
   Leave empty to disable — the button will show a setup hint instead of failing silently. */
const SONDE_WORKER="https://sonde-worker.standphoto.workers.dev";
const SONDE_STATIONS=[
  {id:"48601",name:"Penang 槟城",lat:5.30,lon:100.27},
  {id:"48615",name:"Kota Bharu 哥打峇鲁",lat:6.17,lon:102.28},
  {id:"48650",name:"Sepang KLIA 雪邦",lat:2.73,lon:101.70},
  {id:"96413",name:"Kuching 古晋",lat:1.48,lon:110.33},
  {id:"96441",name:"Bintulu 民都鲁",lat:3.20,lon:113.03},
  {id:"96471",name:"Kota Kinabalu 亚庇",lat:5.94,lon:116.05},
  {id:"96481",name:"Tawau 斗湖",lat:4.27,lon:117.89},
];
let SONDE=null, SONDE_ON=false;
function sondePrefOn(){ try{ return localStorage.getItem("skewt.sondeOn.v1")!=="0"; }catch(e){ return true; } }
function setSondePref(on){ try{ localStorage.setItem("skewt.sondeOn.v1", on?"1":"0"); }catch(e){} }
let WIND_SCALE_MAX=null;   // km/h axis max shared by all 24 hours — keeps the wind charts from rescaling while scrubbing
let HT_SCALE_MAX=null;     // km height-axis max shared by all 24 hours — same reason (top wind level varies by hour)
function nearestSonde(lat,lon){
  let best=null,bd=1e9;
  for(const st of SONDE_STATIONS){
    const d=Math.hypot((st.lat-lat)*111,(st.lon-lon)*111*Math.cos(lat*Math.PI/180));
    if(d<bd){bd=d;best={...st,km:Math.round(d)};}
  }
  return best;
}
function sondeInfoMsg(txt,warn){
  const e=document.getElementById("sondeInfo");
  if(e){e.textContent=txt;e.classList.toggle("warn",!!warn);}
}
function updateSondeUI(){
  const lg=document.getElementById("legend"); if(lg)lg.innerHTML=buildLegend();
  const b=document.getElementById("sondeBtn"); if(!b)return;
  b.textContent="🎈 "+(SONDE_ON?L("隐藏实测探空","Hide observed sounding"):L("叠加实测探空","Overlay observed sounding"));
  b.classList.toggle("on",SONDE_ON);
  if(SONDE_ON&&SONDE){
    const age=Math.round((Date.now()-new Date(SONDE.time).getTime())/3600e3);
    const cyc=new Date(SONDE.time).getUTCHours();
    const stale=age>13;
    sondeInfoMsg(`🎈 ${SONDE.stName} ${SONDE.station} · ${String(cyc).padStart(2,"0")}Z · `+
      L(`${age}小时前${stale?"（已较旧）":""}`,`${age}h ago${stale?" (getting old)":""}`)+
      ` · ${SONDE.km} km`, stale);
  } else if(!SONDE_ON){ sondeInfoMsg(""); }
}
async function toggleSonde(){
  if(SONDE_ON){ SONDE_ON=false; setSondePref(false); updateSondeUI(); if(DATA)showHour(CUR_I); return; }
  setSondePref(true);
  if(!LATLON){ sondeInfoMsg(L("请先加载一个地点。","Load a location first."),true); return; }
  if(!SONDE_WORKER){ sondeInfoMsg(L("未配置探空数据源 — 请部署 sonde-worker.js 并把网址填入 SONDE_WORKER。","Sonde source not configured — deploy sonde-worker.js and set SONDE_WORKER."),true); return; }
  const st=nearestSonde(LATLON[0],LATLON[1]);
  sondeInfoMsg(L(`正在获取 ${st.name} 实测探空…`,`Fetching ${st.name} sounding…`));
  try{
    const r=await fetch(`${SONDE_WORKER.replace(/\/$/,"")}/?stn=${st.id}`);
    const d=await r.json();
    if(!r.ok||!d.levels) throw new Error(d.error||("HTTP "+r.status));
    SONDE={...d, stName:st.name.split(" ")[0], km:st.km};
    SONDE_ON=true; updateSondeUI(); if(DATA)showHour(CUR_I);
  }catch(e){
    SONDE=null; SONDE_ON=false;
    sondeInfoMsg(L("实测探空获取失败：","Sounding fetch failed: ")+e.message,true);
    const b=document.getElementById("sondeBtn"); if(b)b.classList.remove("on");
  }
}
/* ================= end radiosonde overlay ================= */
let COMPARE_MODEL=(function(){ try{const v=localStorage.getItem("skewt.cmp.v1"); return MODELS.some(m=>m.api===v)?v:""; }catch(e){ return ""; } })();
let DATA2=null;
function populateCmpSel(){
  const sel=document.getElementById("cmpSel"); if(!sel)return;
  sel.innerHTML=`<option value=""${COMPARE_MODEL===""?" selected":""}>${L("关闭对比","Compare off")}</option>`+
    MODELS.map(m=>`<option value="${m.api}"${m.api===COMPARE_MODEL?" selected":""}>${m.short} · ${L(m.zh,m.en)}</option>`).join("");
}
async function refreshCompare(){
  if(!COMPARE_MODEL||!LATLON){ DATA2=null; if(DATA)showHour(CUR_I); return; }
  try{
    DATA2=await getSounding(LATLON[0],LATLON[1],COMPARE_MODEL);
    if(DATA)showHour(CUR_I);
  }catch(e){ DATA2=null; if(DATA)showHour(CUR_I); }
}
function modelIsSurfaceOnly(){ const m=MODELS.find(x=>x.api===MODEL); return !!(m&&m.surfaceOnly); }
/* ---- per-farm default model (populated from RainScore Lab findings) ----
   Priority: user's saved choice for this farm > farm's baked-in `model` field > current global model.
   Switching the model while a farm is loaded saves it as that farm's default automatically. */

/* ---- shared storm scoring: single source of truth for the ingredients panel,
       the 24-hour risk strip, and the WhatsApp share ---- */
function stormScores(P,A){
  const pw=A.pw, li=A.LI, ki=A.KI, convT=A.convT, Tnow=P.Tsfc, sh=A.shear;
  const cape=(A.capeMU!=null?A.capeMU:A.cape);   // fuel: most-unstable parcel (sees elevated instability)
  const cin =(A.cinSB!=null?A.cinSB:A.cin);      // cap: what a SURFACE parcel must break through
  const m = pw>=45?2: pw>=30?1:0;
  const i = (cape>=1000||li<=-4)?2: (cape>=300||li<=-1||ki>=30)?1:0;
  const capStrong = cin<=-50;
  const canHeat = (Tnow!=null && convT!=null && Tnow>=convT-1);
  const l = capStrong?0: (canHeat||cin>-25)?2:1;
  const sc = sh==null?1: sh>=37?2: sh>=20?1:0;
  // verdict branch (matches the panel's wording)
  let branch;
  if(m>=2 && i>=2 && l>=1) branch=3;
  else if(m>=1 && i>=1 && l>=1) branch=2;
  else if(m>=2 && i===0) branch=1;
  else branch=0;
  // strip level: verdict branch, bumped by actual forecast rain
  const rain=P.precip||0;
  let level=branch;
  if(rain>=4) level=3; else if(rain>=0.5) level=Math.max(level,2); else if(rain>=0.1) level=Math.max(level,1);
  return {m,i,l,s:sc,branch,level};
}
function stormVerdict(branch){

  if(branch===2) return [L("🌦 可能有阵雨/雷暴 — 要素大致具备，但还差触发。","🌦 Showers/storms possible — the pieces are loosely there but need a trigger."),"var(--warn)"];

    `Step through the hour strip and watch for the ingredients <b>coming together</b>:<br><br>• <b>Dew point climbing</b> and the green line hugging the red = moisture arriving.<br>• <b>CAPE rising</b> and <b>LI going more negative</b> through late morning = the atmosphere loading up.<br>• <b>CIN shrinking toward zero</b> = the cap weakening; when it breaks, storms can fire fast.<br>• <b>Surface temperature approaching the convective temperature</b> = heating is about to trigger convection — classic mid-afternoon tropical storm timing.<br><br>When moisture and instability are both high <b>and</b> the cap is gone, a storm is likely within an hour or two — often signalled first by towering cumulus building overhead.`)}</div>

  return QR + `<div class="sect">${L("看懂图表","Reading the chart")}</div>`
  +D(L("什么是 Skew-T / Log-P 探空图？","What is a Skew-T / Log-P diagram?"),
    `它自下而上描绘大气。高度向上增加，气压按<b>对数</b>刻度下降（即“Log-P”）。温度线向右<b>倾斜</b>45°（即“Skew-T”），让关键曲线展开而不挤成一条竖线。最重要的两条线：红色<b>温度</b>线与绿色<b>露点</b>线。两者的相对位置揭示水汽、云和不稳定度。`,
    `It plots the atmosphere from the ground up. Height increases upward and pressure drops on a <b>log</b> scale (that's the "Log-P"). Temperature lines are <b>skewed</b> 45° to the right (the "Skew-T") so the important curves spread out instead of bunching into a vertical smear. Two traces matter most: the red <b>temperature</b> line and the green <b>dew point</b> line. Where they sit relative to each other tells you about moisture, cloud, and instability.`)
  +D(L("温度与露点 — 水汽差距","Temperature vs dew point — the moisture gap"),
    `红绿两线<b>相距远</b>=该层空气干燥；<b>贴在一起</b>=空气饱和，云在此生成。两线并行的一段就是云层。地面处的差距叫“露点差”；数值小意味着闷热潮湿、雷暴蓄势待发。`,
    `When the red and green lines are <b>far apart</b>, the air is dry at that level. When they <b>touch</b>, the air is saturated — that's where cloud forms. A layer where they run together is a cloud layer. The gap at the surface is the "dew point depression"; small values mean muggy, humid air primed for storms.`)
  +D(L("抬升气块与 CAPE 区域","The lifted parcel & the CAPE area"),
    `黄色虚线是被抬升的地面<b>气块</b>。它先沿<b>干绝热线</b>冷却，到<b>LCL</b>（云底）饱和后改沿<b>湿绝热线</b>较慢冷却。气块比环境<b>更暖</b>之处即有浮力 — 红色阴影面积就是<b>CAPE</b>（风暴燃料）。近地面气块<b>更冷</b>的区域是<b>CIN</b>，压制风暴的盖子。`,
    `The yellow dashed line is a <b>parcel</b> of surface air lifted upward. It first cools along a <b>dry adiabat</b> until it saturates at the <b>LCL</b> (cloud base), then cools slower along a <b>moist adiabat</b>. Where the parcel is <b>warmer</b> than the environment it's buoyant — that shaded red area is <b>CAPE</b> (storm fuel). Where it's <b>colder</b> near the ground, that's <b>CIN</b>, the cap holding storms back.`)
  +D(L("图中线条与标注的高度","The lines on the chart & the levels marked"),
    `<b>干绝热线</b>（棕）是未饱和气块上升时的降温路径 — 每升高1公里约降10°C；<b>湿绝热线</b>（绿虚线，又称伪绝热线）是饱和气块的路径 — 水汽凝结释放潜热，降温较慢，热带低层约4–6°C/km；<b>混合比线</b>（紫）上每公斤干空气所含的水汽克数(g/kg)保持不变。三者构成背景网格。水平标记是关键高度：右侧的<b>LCL</b>（云底）、<b>LFC</b>（自由对流高度）、<b>EL</b>（风暴顶），左侧蓝色的<b>0°C冻结层</b>。右缘的风<b>羽</b>显示各高度的风 — 注意：风羽是全球航空标准，以<b>节</b>为单位（一长羽=10节，半羽=5节，实心三角=50节），而数值卡与风速廓线用<b>公里/小时</b>（一长羽≈19 km/h，两羽≈37 km/h；节数×约1.85）。`,
    `<b>Dry adiabats</b> (brown) are the cooling path of an unsaturated rising parcel — about 10 °C per km. <b>Moist adiabats</b> (green dashed, also called pseudoadiabats) are the path once saturated — condensation releases latent heat, so cooling slows to ~4–6 °C/km in the warm tropics. Along a <b>mixing-ratio line</b> (purple), the grams of water vapour per kilogram of dry air (g/kg) stay constant. Together they form the background grid. The horizontal markers are key heights: <b>LCL</b> (cloud base), <b>LFC</b> (where a parcel rises freely), <b>EL</b> (storm top) on the right, and the blue <b>0°C freezing level</b> on the left. Wind <b>barbs</b> up the right edge show wind at every height — each full feather is 10 knots, a half feather 5, a solid triangle 50. Note: barbs are a global aviation standard drawn in <b>knots</b>, while the readout card and wind-speed profile show <b>km/h</b> (1 full feather ≈ 19 km/h; multiply knots by ~1.85). So one full feather ≈ 19 km/h, two ≈ 37 km/h, and so on.`)
  +`<div class="sect">${L("数字详解","The numbers explained")}</div>`
  +D(L("深入理解 CAPE 与 CIN","CAPE & CIN in depth"),
    `<b>CAPE</b>（对流有效位能）是抬升气块比环境更暖的红色阴影面积 — 上升气流可用的燃料，单位焦耳/公斤。低于500偏弱，1000–2500强，超过2500爆发性。<b>CIN</b>（对流抑制能）相反：近地面的负浮力区，通常是一层暖“盖”，气块必须被推过它才能到达LFC。强盖可整个下午压制风暴 — 然后突然破裂，把蓄积的CAPE一次释放。<br><br><b>计算方法：</b>本应用沿<b>精确伪绝热线</b>（守恒相当位温 θe，Bolton 1980）抬升气块，并对气块与环境均使用<b>虚温</b>（计入水汽使空气变轻的效应）积分求得CAPE与CIN。“会下雨/雷暴吗”面板中的“被盖住”判断正是由CIN驱动。`,
    `<b>CAPE</b> (Convective Available Potential Energy) is the shaded red area where the lifted parcel is warmer than the environment — the fuel available to an updraft, in joules per kilogram. Under 500 is weak, 1000–2500 is strong, above 2500 is explosive. <b>CIN</b> (Convective Inhibition) is the opposite: a negative area near the ground, usually a warm "cap", that a parcel must be pushed through before it can reach its LFC. A strong cap can suppress storms all afternoon — then break suddenly, releasing all the built-up CAPE at once.<br><br><b>How it's computed:</b> this app lifts the parcel along the <b>exact pseudoadiabat</b> (conserving equivalent potential temperature θe, Bolton 1980) and integrates CAPE and CIN using <b>virtual temperature</b> for both parcel and environment — accounting for water vapour making air lighter. The "capped" verdict in the storm panel is driven directly by CIN.`)
  +D(L("不稳定指数：LI、K、总指数、Showalter","Instability indices: LI, K, Total Totals, Showalter"),
    `把探空压缩成一个数字的捷径。<br><br><b>抬升指数（LI）</b>：把地面气块抬到500 hPa后与环境相减。正值=稳定，−3至−6不稳定，低于−6非常不稳定。<br><br><b>K指数</b>：综合中层水汽与递减率 — 热带气团雷暴的好指标。约30以上易发雷暴，40以上几乎必然。<br><br><b>总指数（TT）</b>：44+ 雷暴，50+ 强雷暴，56+ 有强对流潜势。<br><br><b>Showalter</b>：类似LI但从850 hPa抬升。负值=高空不稳定。`,
    `Shortcuts that squeeze the sounding into one number.<br><br><b>Lifted Index (LI)</b>: lift a surface parcel to 500 hPa and subtract it from the environment. Positive = stable, −3 to −6 unstable, below −6 very unstable.<br><br><b>K-Index</b>: blends mid-level moisture and lapse rate — a great tropical air-mass-storm gauge. Above ~30 storms are likely, above 40 near-certain.<br><br><b>Total Totals</b>: 44+ = thunderstorms, 50+ = strong, 56+ = severe potential.<br><br><b>Showalter</b>: like LI but lifting from 850 hPa. Negative = unstable aloft.`)
  +D(L("温度递减率 — 为何越陡越不稳定","Lapse rates — why steep means unstable"),
    `每上升一公里温度下降多少（°C/km）。若环境降温比上升气块更快，气块始终更暖、持续上升 — 即不稳定。<b>陡的递减率（≥8 °C/km）意味着不稳定大气</b>与强上升气流；平缓或逆温（随高度升温）则是稳定的盖层。热带中层常见值约5–6 °C/km，6.5–8为条件性不稳定。700–500 hPa的递减率是经典的中层风暴指标。<br><br>本应用用<b>真实层厚</b>（模式位势高度，或按温度廓线以流体静力学积分）换算 °C/km，而非固定近似。`,
    `How fast temperature drops as you climb, in °C per km. If the environment cools faster than a rising parcel, the parcel stays warmer and keeps rising — instability. <b>Steep rates (≥8 °C/km) mean an unstable atmosphere</b> with strong updrafts; a shallow rate or an inversion (warming with height) is a stable, capping layer. Typical tropical mid-levels run ~5–6 °C/km; 6.5–8 is conditionally unstable. The 700–500 hPa rate is the classic mid-level storm gauge.<br><br>The app converts to °C/km over the <b>true layer thickness</b> (model geopotential heights, or hydrostatic integration of the temperature profile) — not a fixed approximation.`)
  +D(L("关键高度：LCL、LFC、EL、对流温度","Key levels: LCL, LFC, EL, convective temperature"),
    `<b>LCL</b>是云底 — 上升的地面空气首次饱和之处。<b>LFC</b>更高，气块从此自行上升；LCL到LFC之间是风暴必须被强迫穿过的一层。<b>EL</b>接近顶部 — 大致是砧状云顶高度。<b>对流温度</b>是仅靠日晒就能触发风暴所需的地面温度；若接近当前温度，风暴一点就着。`,
    `<b>LCL</b> is cloud base — where rising surface air first saturates. <b>LFC</b> is higher, where a parcel finally becomes buoyant and rises on its own; the LCL-to-LFC gap is the layer a storm must be forced through. <b>EL</b> is near the top — roughly the anvil height. The <b>convective temperature</b> is how hot the surface must get for heating alone to launch storms; if it's near the current temperature, storms fire easily.`)
  +D(L("冻结层与湿球零度（冰雹线索）","Freezing level & wet-bulb zero (hail clues)"),
    `<b>冻结层</b>（蓝线）是温度跨越0°C的高度。<b>湿球温度</b>是让水在空气中蒸发、把空气冷却到极限时的温度 — 空气越干，蒸发降温越多，湿球温度越低于气温。<b>湿球零度（WBZ）</b>就是湿球温度跨越0°C的高度，总是<b>低于</b>冻结层。预报员用湿球零度高度判断冰雹：约2–3.5公里时雹块可落地；太高则融化殆尽。热带这些层都很高，所以地面冰雹罕见。`,
    `The <b>freezing level</b> (blue line) is where temperature crosses 0 °C. The <b>wet-bulb temperature</b> is how cold air gets if you evaporate water into it until it can cool no further — the drier the air, the more evaporation cools it below the actual temperature. The <b>wet-bulb zero (WBZ)</b> is where that wet-bulb temperature crosses 0 °C — always <b>below</b> the freezing level. Forecasters watch the wet-bulb-zero height for hail: around 2–3.5 km, hailstones survive the fall; much higher and they melt. In the tropics these levels are high, so surface hail is rare.`)
  +D(L("风切变与风矢端图","Wind shear & the hodograph"),
    `<b>风切变</b>是地面到风暴层（0–6公里）之间风的变化。<b>风矢端图</b>把各高度的风画成点（东西向为横轴、南北向为纵轴）并自下而上连线。短而直=弱切变、脉冲风暴。长而弯=强切变伴转向 — 有组织、可能强烈风暴的指纹。点的颜色代表高度：地面绿色，向上经琥珀色到风暴顶红色。`,
    `<b>Wind shear</b> is the change in wind from ground to storm level (0–6 km). The <b>hodograph</b> plots each level's wind as a dot (east–west horizontal, north–south vertical) joined from the ground up. Short, straight = weak shear, pulse storms. Long, curved = strong shear with turning — the fingerprint of organized, potentially severe storms. Dot colours mark height: green near the surface up through amber to red at storm top.`)
  +D(L("急流 — 如何在高空识别","The jet stream — spotting it aloft"),
    `<b>急流</b>是高空（通常9–12公里，约300–200 hPa）一条狭窄的强风带，风速可达120–250+ km/h。它标记强温度梯度并引导天气系统 — 风暴沿其移动。在<b>风速廓线</b>上，留意曲线在高处向右鼓出；虚线标出急流强度（≥120 km/h ≈ 65节）。只有峰值既快（≥120）又高（≥8公里）才显示红色“急流”标记；强而偏低的峰值标为“风速极值” — 增添切变的中层强风，但不是急流。在<b>风羽</b>上，急流表现为顶部密集的羽毛（三角旗）。<b>热带提示：</b>赤道附近（如马来西亚）中纬度急流很少经过头顶，真正的急流标记并不常见 — 但本应用可全球使用，走到哪里都能识别。`,
    `The <b>jet stream</b> is a fast, narrow ribbon of wind high up (usually 9–12 km, near 300–200 hPa) where speeds top 120–250+ km/h. It marks strong temperature boundaries and steers weather systems — storms track along it. On the <b>wind-speed profile</b>, watch for the curve bulging far to the right high up; a dashed line marks jet strength (≥120 km/h ≈ 65 kt). A red "JET" marker appears only when the peak is both fast (≥120 km/h) and genuinely high (≥8 km). A strong-but-lower peak is labelled a "wind max" instead — mid-level winds that add shear but aren't the jet stream. On the <b>wind barbs</b>, a jet shows as heavily-feathered barbs (pennants) near the top. <b>Tropical note:</b> near the equator (like Malaysia) the mid-latitude jets rarely pass overhead, so a true "JET" marker is uncommon — but this app travels worldwide, so it's ready wherever you are.`)
  +D(L("降雨量如何估算","How rain volume is estimated"),
    `头条降雨量（毫米）直接来自天气模式。<b>可降水量（PW）</b>是把头顶整层大气的水汽全部凝结落下所能得到的雨量（毫米）— 应用按比湿对气压积分独立计算。它是<b>潜力</b>而非预报：60毫米的气柱未必下60毫米的雨。“降雨潜力”卡片再乘以降水效率（由CAPE与湿度驱动），作为对模式预报的物理交叉校验；两者差距大本身就是预报不确定性的信号。`,
    `The headline forecast rain (mm) comes straight from the weather model. <b>Precipitable Water (PW)</b> is the depth of rain you'd get if every gram of vapour in the column above you condensed and fell — the app computes it independently by integrating specific humidity over pressure. It is <b>potential</b>, not a forecast: a 60 mm column rarely drops 60 mm. The "Rain potential" card then applies a precipitation-efficiency factor (driven by CAPE and humidity) as a physics cross-check on the model. Big divergence between the two is itself a signal of forecast uncertainty.`)
  +D(L("雾、云与风基础","Fog, cloud & wind basics"),
    `当空气接近饱和（温度与露点几乎相等）、风力轻、能见度下降时会标记<b>雾</b> — 最常见于黎明前后。低于1公里=真雾；1–4公里=轻雾/霾。<b>云量</b>分低/中/高三层，可区分灰蒙蒙的低云与稀薄卷云。<b>风</b>为风速与风的<b>来向</b>（“西南风”来自西南方）。`,
    `<b>Fog</b> is flagged when the air is nearly saturated (temperature and dew point almost equal), winds are light, and visibility drops — most likely around dawn. Under 1 km = true fog; 1–4 km = mist/haze. <b>Cloud cover</b> is split low/mid/high so you can tell a grey overcast base from thin cirrus. <b>Wind</b> is the speed and the direction it blows <b>from</b> (a "SW" wind comes out of the southwest).`)
  +D(L("选择天气模式","Choosing a weather model"),
    `顶部的<b>模式</b>选择器可切换驱动探空的全球模式，因为不同模式在同一地点常给出不同结果 — 这正是交叉比对的价值。<br><br>• <b>IFS 0.25°（欧洲 ECMWF）</b> — 综合表现最佳的全球模式，含完整高空数据，<b>默认首选</b>。<br>• <b>IFS 9km</b> — ECMWF 最高分辨率的实时模式，驱动我们的 WeatherNext 设施；但公开数据<b>仅含地面</b>，故温湿曲线与降雨可用，风矢端图/风速廓线不可用。<br>• <b>AIFS（ECMWF · AI）</b> 与 <b>GraphCast（NOAA · AI）</b> — 新一代 AI 模式，含完整高空数据。<br>• <b>ICON / JMA / CMA / GEM / GFS</b> — 德国、日本、中国、加拿大、美国的业务模式。<br><br>提示：马来西亚等热带地区，<b>best_match 会锁定为 ECMWF</b>，所以手动选择模式才能真正比较。切换后应用会立即以新模式重新拉取。<br><br><b>每个果园可有自己的默认模式</b> — 这是 RainScore Lab 工作流的落地：打开<b>果园列表</b>，每一行右侧都有一个小小的<b>模式下拉框</b>，直接为该果园选定默认模式即可（例如 RainScore 显示某果园 GFS 最准，就在该行选 GFS）。此后点选该果园会自动采用该模式；查看某果园时切换顶部模式选择器同样会自动记住。添加新果园时也可直接指定。<br><br><b>「自动」的含义：</b>设为「自动」的果园<b>不改变</b>模式 — 直接沿用顶部选择器当前所选。注意：若你刚看过一个有默认模式的果园（例如 GFS），选择器已被切到 GFS，此时打开「自动」果园会沿用 GFS 而不是回到 IFS。<br><br><b>「我的位置」（GPS）没有默认模式</b> — 每次都是自由选择，切换模式不会被记住，方便随时交叉比对。`,
    `The <b>Model</b> selector at the top switches which global model drives the sounding. Different models often disagree at the same spot — that disagreement is exactly what's worth comparing.<br><br>• <b>IFS 0.25° (ECMWF)</b> — the best all-round global model, with full upper-air data. This is the <b>default</b>.<br>• <b>IFS 9km</b> — ECMWF's highest-resolution real-time model and what powers our WeatherNext facility; but the open feed is <b>surface-only</b>, so temperature/dew curves and rain work while the hodograph and wind profile don't.<br>• <b>AIFS (ECMWF · AI)</b> and <b>GraphCast (NOAA · AI)</b> — the new generation of AI models, with full upper-air data.<br>• <b>ICON / JMA / CMA / GEM / GFS</b> — the operational models of Germany, Japan, China, Canada and the US.<br><br>Tip: in the tropics (like Malaysia) <b>best_match locks to ECMWF</b>, so picking a model manually is the only way to really compare. Switching reloads the sounding immediately.<br><br><b>Each farm can have its own default model</b> — this operationalizes the RainScore Lab workflow: open <b>Browse farms</b>, and every row has a small <b>model dropdown</b> on its right. Pick the model directly there (e.g. RainScore shows GFS is most accurate for an orchard → select GFS on that row). Tapping that farm then always loads with its model. Switching the top model selector while viewing a farm also saves it automatically, and new farms can be created with a default.<br><br><b>What "Auto" means:</b> a farm set to <b>Auto</b> doesn't change the model — it simply follows whatever the top selector currently shows. Note: if you just viewed a farm with a default (say GFS), the selector is now on GFS, so opening an Auto farm continues in GFS rather than jumping back to IFS.<br><br><b>"My location" (GPS) has no default model</b> — every visit is a free choice, and switching models there is never remembered, so you can cross-compare freely.`)
  +D(L("小时风险条、分享与自动加载","The risk strip, sharing & auto-load"),
    `<b>24小时风险条</b>是小时格上方的彩色细条：暗色=平静，绿色=潮湿/毛毛雨，琥珀=可能有风暴，红色=要素齐备。它用与“会下雨/雷暴吗”面板相同的评分，让你一眼看出该担心哪个时段 — 点击任一格即可跳到该小时。<br><br><b>📤 分享</b>按钮把当前地点、时刻、结论、CAPE/CIN/可降水量与所用模式打包成简讯，一键发送到 WhatsApp。<br><br>应用会<b>记住上次查看的地点</b>并在下次打开时自动载入。`,
    `The <b>24-hour risk strip</b> is the thin coloured bar above the hour tiles: dim = quiet, green = moist/drizzle, amber = storms possible, red = ingredients in place. It uses the same scoring as the "Is a storm coming?" panel so you can see at a glance which hour to worry about — tap any segment to jump to that hour.<br><br>The <b>📤 share</b> button packages the location, hour, verdict, CAPE/CIN/PW and the model in use into a short message and opens WhatsApp.<br><br>The app <b>remembers the last location</b> you viewed and auto-loads it next time you open it.`)
  +D(L("实测探空叠加（气球观测）","Observed sounding overlay (radiosonde)"),
    `<b>探空气球（radiosonde）</b>是气象局每天施放的真实观测：气球携带传感器升空，逐层实测温度、湿度与风 — 它是大气廓线的“地面真相”。应用会<b>默认</b>把<b>最近站点的最新实测</b>以灰白虚线叠加到预报曲线上（点🎈可隐藏，选择会被记住）：两组曲线贴近说明模式可信；实测更湿、更暖或逆温位置不同，就是模式的偏差 — 这正是 RainScore Lab 思想应用到整个大气柱。<br><br>注意：马来西亚的施放站点有限（雪邦、槟城、哥打峇鲁及东马数站），距离果园可能上百公里，且每天仅00Z/12Z施放 — 界面会显示站点、施放时间与<b>数据年龄</b>；超过约13小时会提示已较旧。`,
    `A <b>radiosonde</b> is the real thing: a weather-service balloon carrying sensors that measure temperature, humidity and wind layer by layer as it rises — the ground truth for the atmospheric profile. The app overlays the <b>latest launch from the nearest station</b> as grey/white dashed curves on top of the forecast <b>by default</b> (tap 🎈 to hide — your choice is remembered): curves hugging each other means the model is trustworthy; the observation being moister, warmer, or placing an inversion elsewhere is the model's bias — RainScore Lab thinking applied to the whole column.<br><br>Note: Malaysia's launch network is sparse (Sepang, Penang, Kota Bharu and a few East Malaysia sites), possibly 100+ km from your orchard, launching only at 00Z/12Z — the app shows the station, launch time and <b>data age</b>, and warns past ~13 hours.`)
  +D(L("气块选择、DCAPE 与新图层","Parcels, DCAPE & the new layers"),
    `<b>抬升气块（SB/ML/MU）：</b>图上方的选择器决定沿虚线抬升的是哪种气块。<b>SB 地面</b>＝地面空气（午后经典）；<b>ML 混合层</b>＝最底层100 hPa的平均（更能代表整层受热）；<b>MU 最不稳定</b>＝低层300 hPa内θe最高的那层 — <b>清晨逆温压住地面时，燃料常藏在逆温之上</b>，此时SB CAPE很小而MU CAPE很大。「CAPE 三气块」卡片一眼对比三者；「会下雨吗」面板的燃料用MU判断、盖子用SB判断，因此清晨不再低估午后风险。<br><br><b>DCAPE 下沉能量：</b>雨水在中层干空气中蒸发降温，冷空气砸向地面形成<b>下击暴流</b> — 会扫落果实、折断枝条。DCAPE越大风越猛：&lt;400弱，400–800中等，800–1200强，&gt;1200极强。<br><br><b>新图层：</b>青色细线＝<b>湿球温度</b>；右侧蓝色竖条＝<b>湿度/云层带</b>（越蓝越接近饱和）；「对比」下拉可叠加<b>第二个模式</b>（紫色曲线）直接看分歧；<b>时间-高度湿度图</b>把24小时的水汽结构铺成一张图，点任一列即可跳到该小时；📷按钮把当前探空图<b>生成图片分享</b>到 WhatsApp。`,
    `<b>Lifted parcels (SB/ML/MU):</b> the selector above the chart chooses which parcel rises along the dashed line. <b>SB Surface</b> = ground air (classic afternoon); <b>ML Mixed-layer</b> = average of the lowest 100 hPa (represents whole-layer heating); <b>MU Most-unstable</b> = the highest-θe level in the lowest 300 hPa — <b>on mornings when an inversion pins the surface, the fuel often hides above it</b>, so SB CAPE reads tiny while MU CAPE is large. The "CAPE 3 parcels" card compares all three at a glance; the storm panel judges fuel with MU and the cap with SB, so mornings no longer understate the afternoon threat.<br><br><b>DCAPE, downdraft energy:</b> rain evaporating into dry mid-level air chills it, and that cold air crashes to the ground as a <b>downburst</b> — the wind that strips fruit and snaps branches. Bigger DCAPE = harder crash: &lt;400 weak, 400–800 moderate, 800–1200 strong, &gt;1200 extreme.<br><br><b>New layers:</b> the thin cyan line is the <b>wet-bulb temperature</b>; the blue strip on the right edge is the <b>humidity/cloud bar</b> (bluer = closer to saturation); the <b>Compare</b> dropdown overlays a <b>second model</b> (violet curves) to see disagreement directly; the <b>time-height humidity panel</b> lays the whole day's moisture structure out in one picture — tap a column to jump to that hour; and the 📷 button renders the current sounding as an <b>image to share</b> on WhatsApp.`)
  +D(L("气块矩阵与降雨概率","The parcel matrix & rain probability"),
    `<b>气块矩阵</b>把 SB/ML/MU 三个 CAPE 的<b>分歧模式</b>翻译成五种作业场景（隐藏燃料／全层蓄能／需午后加热／边缘／确实稳定），当前小时所属的一行会高亮 — 拖动小时条可以看到白天如何从「隐藏燃料」演变为「全层蓄能」。判断阈值：约800 J/kg以上算充足燃料，300以下算安静。<br><br><b>降雨概率</b>（风险条下方的蓝色小柱与头条的百分比）来自<b>模式集合（ensemble）</b>：同一模式用微扰初值跑多次，出现≥0.1毫米降雨的成员比例即为概率 — 这是比单一确定值更诚实的说法。注意：并非所有模式都提供概率；没有时该条会隐藏、头条不显示百分比，绝不编造。<br><br><b>集合降雨投影（扇形图）</b>更进一步：同一模式的<b>51个成员</b>各自给出每小时雨量，浅蓝阴影是成员的10–90%范围，深带是25–75%，亮线是中位数 — 扇形<b>越窄</b>成员越一致，预报越可信；<b>越宽</b>说明大气处于难料状态，一切计划都该留余量。点图任意处可跳到该小时。下方三个<b>分级概率</b>直接对应农事：≥1mm＝药液可能被冲（喷药风险）、≥5mm＝晒果/干燥中断、≥10mm＝收果运输受阻。右上角的一致性标签（高一致/中等/分歧大）是全天10–90%平均宽度的总结。`,
    `The <b>parcel matrix</b> translates the <b>disagreement pattern</b> among the three CAPEs (SB/ML/MU) into five operational scenarios (hidden fuel / loaded everywhere / needs afternoon heating / marginal / genuinely stable). The current hour's row is highlighted — scrub the hours to watch a day evolve from "hidden fuel" into "loaded everywhere". Thresholds: ≥~800 J/kg counts as ample fuel, <300 as quiet.<br><br>The <b>rain probability</b> (small blue bars under the risk strip, and the percentage in the headline) comes from the <b>model ensemble</b>: the same model run many times with tiny perturbations, and the probability is the share of members producing ≥0.1 mm — an honest statement compared with a single deterministic number. Note: not every model provides it; when absent the strip hides and no percentage is shown — never invented.<br><br>The <b>ensemble rain projection (fan chart)</b> goes further: <b>51 members</b> of the same model each produce an hourly rainfall; the light-blue shade spans the members' 10–90% range, the darker band 25–75%, the bright line the median. A <b>narrow</b> fan means the members agree — trust the forecast; a <b>wide</b> fan means the atmosphere is in a hard-to-pin state — leave margin in every plan. Tap anywhere on the chart to jump to that hour. The three <b>tiered probabilities</b> below map straight to farm work: ≥1 mm = spray may wash off, ≥5 mm = drying disrupted, ≥10 mm = harvest logistics at risk. The agreement badge (high/moderate/low) summarizes the day's average 10–90% width.`)
  +D(L("数据与计算精度","Data & computation accuracy"),
    `为保证可信，本应用的热力学全部在设备端按标准方法计算：饱和水汽压与LCL用 <b>Bolton (1980)</b> 公式；抬升气块沿守恒<b>相当位温 θe</b>（气块携带的总热量指标，含凝结潜热）的精确伪绝热线；CAPE/CIN 采用<b>虚温</b> — 含水汽的空气更轻，虚温就是把这一效应折算进温度。高度优先取<b>模式位势高度</b>（模式自算的各气压层海拔，减去地形高程得到离地高度 — 对金马仑等高原果园尤为重要），缺失时按温度廓线做流体静力学积分。数据缺失时显示“—”或明确提示，绝不静默编造 — 宁可大声失败，不给假数据。`,
    `For trust, all thermodynamics run on-device with standard methods: saturation vapour pressure and LCL from <b>Bolton (1980)</b>; the lifted parcel follows the exact pseudoadiabat conserving <b>equivalent potential temperature θe</b> (the total-heat tag a parcel carries, latent heat included); CAPE/CIN use <b>virtual temperature</b> — moist air is lighter, and Tv folds that into the temperature. Heights prefer the <b>model's geopotential heights</b> (its own altitude of each pressure level, minus terrain elevation for height above ground — important for highland farms like Cameron), falling back to hydrostatic integration of the temperature profile. Missing data shows "—" or an explicit notice, never a silent guess — loud failure over fake numbers.`)
  +`<div class="guide-credit">${L(
    `数据：Open-Meteo（可选 9 个全球模式）· 热力学在设备端计算。<br>探空为预报廓线，并非实测气球。重要决策请交叉核对官方预警。<br><br>由 Claude Opus 4.8 与 Fable 5 协助构建。`,
    `Data: Open-Meteo (9 selectable global models) · Thermodynamics computed on-device.<br>A sounding is a forecast profile, not a launched balloon. For decisions, cross-check official warnings.<br><br>Built with Claude Opus 4.8 and Fable 5.`)}</div>`;
}
